version: "3.8"

services:
  mysql:
    image: mysql:8.0
    container_name: iot-platform-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-iot_platform_root_password}
      MYSQL_DATABASE: ${DB_NAME:-iot_platform}
      TZ: Asia/Shanghai
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --default-time-zone=+08:00
    volumes:
      - mysql_data:/var/lib/mysql
      - ./docker/mysql/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uroot", "-p${MYSQL_ROOT_PASSWORD:-iot_platform_root_password}"]
      interval: 10s
      timeout: 5s
      retries: 20

  app:
    build: .
    image: iot-platform:latest
    container_name: iot-platform-app
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 3000
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USER: root
      DB_PASSWORD: ${MYSQL_ROOT_PASSWORD:-iot_platform_root_password}
      DB_NAME: ${DB_NAME:-iot_platform}
      TZ: Asia/Shanghai
    ports:
      - "${APP_PORT:-3000}:3000"

volumes:
  mysql_data:
