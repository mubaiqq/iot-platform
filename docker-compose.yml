services:
  app:
    build: .
    image: iot-platform:latest
    container_name: iot-platform-app
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3000
      DB_CONFIG_PATH: /app/data/db-config.json
      TZ: Asia/Shanghai
    ports:
      - "${APP_PORT:-32180}:3000"
    volumes:
      - ./data:/app/data
    extra_hosts:
      - "host.docker.internal:host-gateway"
