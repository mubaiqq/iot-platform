services:
  mysql:
    image: ${MYSQL_IMAGE:-mysql:8.4.4}
    container_name: iot-platform-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:?MYSQL_ROOT_PASSWORD is required}
      MYSQL_DATABASE: ${DB_NAME:-iot_platform}
      MYSQL_USER: ${DB_USER:-iot_user}
      MYSQL_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
      TZ: Asia/Shanghai
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    volumes:
      - mysql_data:/var/lib/mysql
      - ./docker/mysql/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p$$MYSQL_ROOT_PASSWORD --silent"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 30s

  app:
    build:
      context: .
      args:
        NODE_IMAGE: ${NODE_IMAGE:-node:20-alpine}
    image: iot-platform:latest
    container_name: iot-platform-app
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 3000
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USER: ${DB_USER:-iot_user}
      DB_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
      DB_NAME: ${DB_NAME:-iot_platform}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-}
      DB_CONFIG_PATH: /app/data/db-config.json
      TZ: Asia/Shanghai
    ports:
      - "${APP_PORT:-32180}:3000"
    volumes:
      - ./data:/app/data
    user: "${APP_UID:-1000}:${APP_GID:-1000}"
    extra_hosts:
      - "host.docker.internal:host-gateway"

volumes:
  mysql_data:
