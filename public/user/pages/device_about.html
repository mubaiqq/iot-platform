<!DOCTYPE html><html lang="zh"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>关于设备</title><link rel="stylesheet" href="https://cdn.bootcdn.net/ajax/libs/font-awesome/6.5.1/css/all.min.css"><style>*{box-sizing:border-box}body{margin:0;background:#f5f7fb;color:#172033;font-family:Inter,-apple-system,sans-serif;padding:16px}.hero,.history{background:#fff;border-radius:17px;padding:17px}.hero-top{display:flex;align-items:center;gap:12px}.icon{width:46px;height:46px;border-radius:50%;display:grid;place-items:center;background:#eef5ff;color:#3478f6;font-size:19px}.main{flex:1}.main h2{font-size:16px;margin:0}.code{font-size:10px;color:#94a3b8;margin-top:4px}.version{font-size:22px;font-weight:800;margin:18px 0 3px}.hint{font-size:11px;color:#64748b}.new{color:#f59e0b}.btn{width:100%;border:0;border-radius:11px;padding:11px;background:#3478f6;color:#fff;margin-top:15px}.btn:disabled{background:#cbd5e1}.history{margin-top:12px}.history h3{font-size:13px;margin:0 0 11px}.item{padding:12px 0;border-bottom:1px solid #f1f5f9}.item:last-child{border:0}.item b{font-size:12px}.item p{font-size:11px;color:#64748b;white-space:pre-wrap;margin:5px 0}.time{font-size:9px;color:#94a3b8}@media(max-width:500px){body{padding:12px}button,input{font-size:16px!important}}</style></head><body><div class="hero"><div class="hero-top"><div class="icon"><i class="fas fa-microchip"></i></div><div class="main"><h2 id="name">设备</h2><div class="code" id="code"></div></div></div><div class="version" id="current">v1.2.3</div><div class="hint" id="hint">正在检查新版本...</div><button class="btn" id="update" disabled onclick="doUpdate()"><i class="fas fa-circle-check"></i> 已是最新版本</button></div><div class="history"><h3><i class="fas fa-clock-rotate-left"></i> 历史更新</h3><div id="list"></div></div><script>const DATA=__POST_DATA__;const d=DATA.device;let latest=null;name.textContent=d.device_name||'未命名设备';code.textContent=d.device_code+' · '+(d.device_type==='sensor'?'传感器':'控制器');current.textContent='v'+(d.firmware_version||'1.2.2');const parts=v=>String(v||'0').split('.').map(Number);const newer=(a,b)=>{a=parts(a);b=parts(b);for(let i=0;i<3;i++){if(a[i]>b[i])return true;if(a[i]<b[i])return false}return false};const esc=v=>String(v??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));async function load(){const r=await fetch('/api/firmware/versions?target_type='+d.device_type,{cache:'no-store'}),x=await r.json();const vs=x.versions||[];latest=vs[0]||null;if(latest&&newer(latest.version,d.firmware_version||'1.2.2')){hint.className='hint new';hint.textContent='发现新版本 v'+latest.version;update.disabled=false;update.innerHTML='<i class="fas fa-cloud-arrow-down"></i> 更新到 v'+latest.version}else{hint.textContent='当前已是最新版本'}list.innerHTML=vs.map(v=>`<div class="item"><b>v${esc(v.version)}</b><p>${esc(v.release_notes)}</p><div class="time">${new Date(v.created_at).toLocaleString()} · ${(v.file_size/1024).toFixed(1)} KB</div></div>`).join('')||'<div class="item"><p>暂无历史更新</p></div>'}async function doUpdate(){if(!latest)return;update.disabled=true;update.innerHTML='<i class="fas fa-spinner fa-spin"></i> 正在发送升级指令';try{const r=await fetch('/api/devices/'+d.id+'/ota',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({version_id:latest.id})}),x=await r.json();if(!x.success)throw Error(x.error);update.style.background='#059669';update.innerHTML='<i class="fas fa-check"></i> 升级指令已发送'}catch(e){update.style.background='#dc2626';update.textContent=e.message;setTimeout(()=>{update.disabled=false;update.style.background='';update.textContent='重新尝试'},2200)}}load();</script></body></html>
