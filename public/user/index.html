<script>
// Auth guard - check login status before page loads
(async function() {
  try {
    const res = await fetch('/api/me');
    const data = await res.json();
    if (!data.user) {
      window.location.href = '/login';
      return;
    }
    // Store user info for later use
    window.__currentUser = data.user;
    // Auth passed, show page
    document.body.style.display = '';
  } catch (e) {
    window.location.href = '/login';
  }
})();</script>

<script>
// Update username in header & show admin link for admins
function updateHeaderUser() {
  if (window.__currentUser) {
    document.getElementById('headerUsername').textContent = window.__currentUser.username;
    if (window.__currentUser.role === 'admin') {
      document.getElementById('adminLink').style.display = '';
    }
  }
}
// Try now, and also retry after auth guard finishes
updateHeaderUser();
setTimeout(updateHeaderUser, 500);

async function doLogout() {
  await fetch('/api/logout', { method: 'POST' });
  window.location.href = '/login';
}
</script>

  esp32_code:'/user/pages/esp32_code.html',
  esp32_sensor_code:'/user/pages/esp32_sensor_code.html',
  esp32_docs:'/user/pages/esp32_docs.html'
};
function refreshDeviceViews(){
  ['welcome','my_devices'].forEach(function(id){
    var f=document.querySelector('.content-frame[data-id="'+id+'"]');
    if(!f||!f.contentWindow)return;
    try{
      if(typeof f.contentWindow.loadDashboard==='function') f.contentWindow.loadDashboard();
      if(typeof f.contentWindow.loadDevices==='function') f.contentWindow.loadDevices();
    }catch(e){}
  });
}
var __userCloseModal=closeModal;
closeModal=function(){
  __userCloseModal();
  if(window.__deviceListDirty){
    window.__deviceListDirty=false;
    setTimeout(refreshDeviceViews,260);
  }
};
initDefaultTab();
</script>
