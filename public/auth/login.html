<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>登录 - 木白云iot</title>
  <link href="https://fonts.loli.net/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', -apple-system, sans-serif;
      background: #f5f6fa;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .auth-container {
      width: 100%;
      max-width: 420px;
    }
    .auth-header {
      text-align: center;
      margin-bottom: 32px;
    }
    .auth-logo {
      display: inline-flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 16px;
    }
    .logo-icon {
      width: 48px;
      height: 48px;
      background: linear-gradient(135deg, #3b82f6, #8b5cf6);
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      font-size: 22px;
    }
    .logo-text {
      font-size: 24px;
      font-weight: 700;
      color: #1e293b;
    }
    .auth-header p {
      font-size: 14px;
      color: #64748b;
    }
    .auth-card {
      background: #fff;
      border-radius: 16px;
      padding: 32px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.06);
      border: 1px solid #eef0f4;
    }
    .form-group {
      margin-bottom: 20px;
    }
    .form-label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      color: #475569;
      margin-bottom: 6px;
    }
    .form-input {
      width: 100%;
      padding: 12px 14px;
      border: 1.5px solid #e2e8f0;
      border-radius: 10px;
      font-size: 14px;
      font-family: inherit;
      transition: all 0.2s;
      background: #fff;
      color: #1e293b;
    }
    .form-input:focus {
      outline: none;
      border-color: #3b82f6;
      box-shadow: 0 0 0 3px rgba(59,130,246,0.1);
    }
    .form-input::placeholder { color: #94a3b8; }
    .btn {
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 10px;
      font-size: 14px;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      transition: all 0.2s;
    }
    .btn-primary {
      background: #3b82f6;
      color: #fff;
    }
    .btn-primary:hover {
      background: #2563eb;
      box-shadow: 0 4px 12px rgba(59,130,246,0.25);
    }
    .btn-primary:disabled {
      background: #94a3b8;
      cursor: not-allowed;
      box-shadow: none;
    }
    .auth-footer {
      text-align: center;
      margin-top: 24px;
      font-size: 13px;
      color: #64748b;
    }
    .auth-footer a {
      color: #3b82f6;
      text-decoration: none;
      font-weight: 600;
    }
    .auth-footer a:hover { text-decoration: underline; }
    .error-msg {
      background: #fef2f2;
      border: 1px solid #fecaca;
      color: #dc2626;
      padding: 10px 14px;
      border-radius: 10px;
      font-size: 13px;
      margin-bottom: 16px;
      display: none;
      align-items: center;
      gap: 8px;
    }
    .error-msg.show { display: flex; }
    .error-msg i { font-size: 14px; }
    .password-toggle {
      position: absolute;
      right: 12px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      color: #94a3b8;
      cursor: pointer;
      font-size: 16px;
    }
    .password-toggle:hover { color: #475569; }
    .input-wrap { position: relative; }
  @media(max-width:768px){input,select,textarea{font-size:16px!important}}
</style>
</head>
<body>

<div class="auth-container">
  <div class="auth-header">
    <div class="auth-logo">
      <div class="logo-icon"><i class="fas fa-cloud"></i></div>
      <span class="logo-text">木白云iot</span>
    </div>
    <p>物联网设备管理平台</p>
  </div>
  
  <div class="auth-card">
    <div class="error-msg" id="errorMsg">
      <i class="fas fa-exclamation-circle"></i>
      <span id="errorText"></span>
    </div>
    
    <form id="loginForm">
      <div class="form-group">
        <label class="form-label">用户名 / 邮箱</label>
        <input type="text" class="form-input" id="username" placeholder="请输入用户名或邮箱" required>
      </div>
      
      <div class="form-group">
        <label class="form-label">密码</label>
        <div class="input-wrap">
          <input type="password" class="form-input" id="password" placeholder="请输入密码" required>
          <button type="button" class="password-toggle" onclick="togglePassword()">
            <i class="fas fa-eye" id="eyeIcon"></i>
          </button>
        </div>
      </div>
      
      <button type="submit" class="btn btn-primary" id="submitBtn">
        <i class="fas fa-right-to-bracket"></i> 登录
      </button>
    </form>
    
    <div class="auth-footer">
      还没有账号？<a href="/register">立即注册</a>
    </div>
  </div>
</div>

<link rel="stylesheet" href="https://cdn.bootcdn.net/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<script>
function togglePassword() {
  const input = document.getElementById('password');
  const icon = document.getElementById('eyeIcon');
  if (input.type === 'password') {
    input.type = 'text';
    icon.className = 'fas fa-eye-slash';
  } else {
    input.type = 'password';
    icon.className = 'fas fa-eye';
  }
}

function showError(msg) {
  const el = document.getElementById('errorMsg');
  document.getElementById('errorText').textContent = msg;
  el.classList.add('show');
}

function hideError() {
  document.getElementById('errorMsg').classList.remove('show');
}

document.getElementById('loginForm').addEventListener('submit', async function(e) {
  e.preventDefault();
  hideError();
  
  const username = document.getElementById('username').value.trim();
  const password = document.getElementById('password').value;
  
  if (!username || !password) {
    showError('请填写完整信息');
    return;
  }
  
  const btn = document.getElementById('submitBtn');
  btn.disabled = true;
  btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> 登录中...';
  
  try {
    const res = await fetch('/api/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ username, password })
    });
    
    const data = await res.json();
    
    if (data.success) {
      btn.innerHTML = '<i class="fas fa-check-circle"></i> 登录成功';
      btn.style.background = '#059669';
      setTimeout(() => {
        if (data.user.role === 'admin') {
          window.location.href = '/admin/';
        } else {
          window.location.href = '/user/';
        }
      }, 800);
    } else {
      showError(data.error || '登录失败');
      btn.disabled = false;
      btn.innerHTML = '<i class="fas fa-right-to-bracket"></i> 登录';
    }
  } catch (err) {
    showError('网络错误，请重试');
    btn.disabled = false;
    btn.innerHTML = '<i class="fas fa-right-to-bracket"></i> 登录';
  }
});
</script>
</body>
</html>
