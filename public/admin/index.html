<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="utf-8">
<title>木白云iot - 管理后台</title>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="renderer" content="webkit">
<link rel="stylesheet" href="https://cdn.bootcdn.net/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<link href="https://fonts.loli.net/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/admin/admin.css">
<script>
// Auth guard - check login status before page loads
(async function() {
  try {
    const res = await fetch('/api/me');
    const data = await res.json();
    if (!data.user || data.user.role !== 'admin') {
      window.location.href = '/admin/login';
      return;
    }
    // Store user info for later use
    window.__currentUser = data.user;
    // Auth passed, show page
    document.body.style.display = '';
  } catch (e) {
    window.location.href = '/admin/login';
  }
})();</script>

<style>
/* 管理后台侧栏：按运营/数据/权限/配置/系统分组，默认展开 */
.admin-sidebar-nav{padding:8px 8px 14px!important}
.admin-sidebar-nav .nav-group{margin-bottom:7px}
.admin-sidebar-nav .nav-group-title{height:32px;padding:0 10px 0 12px!important;margin:2px 0 4px;border-radius:12px;background:#f8fafc;color:#7b8798!important;font-size:12px!important;font-weight:800!important;letter-spacing:.2px;display:flex;align-items:center;gap:8px}
.admin-sidebar-nav .nav-group-title:hover{background:#f1f5f9!important;color:#475569!important}
.admin-sidebar-nav .nav-group-title>i:first-child{width:18px;height:18px;border-radius:7px;display:flex;align-items:center;justify-content:center;background:#eef5ff;color:#1e40af;opacity:1!important;font-size:10px!important}
.admin-sidebar-nav .nav-group-title span{flex:0 0 auto}.admin-sidebar-nav .nav-group-title em{font-style:normal;margin-left:auto;margin-right:4px;font-size:9px;font-weight:800;color:#1e40af;background:#eff6ff;padding:1px 5px;border-radius:999px}
.admin-sidebar-nav .nav-group-title .chevron{margin-left:auto}.admin-sidebar-nav .nav-group-title em+.chevron{margin-left:0}
.admin-sidebar-nav .nav-group-title~.nav-items{display:block!important;padding:1px 0 2px}
.admin-sidebar-nav .nav-group-title~.nav-items .nav-item{height:34px;padding:0 12px 0 34px!important;border-radius:11px;font-size:13px!important;color:#64748b!important;gap:8px;position:relative;margin-bottom:2px}
.admin-sidebar-nav .nav-group-title~.nav-items .nav-item:before{content:"";position:absolute;left:20px;top:50%;width:4px;height:4px;border-radius:50%;background:#d7dee9;transform:translateY(-50%)}
.admin-sidebar-nav .nav-group-title~.nav-items .nav-item i{font-size:12px!important;width:16px;color:#94a3b8;opacity:.9!important}.admin-sidebar-nav .nav-item:hover{background:#f5f8ff!important;color:#1e40af!important}.admin-sidebar-nav .nav-item:hover i{color:#1e40af}
.admin-sidebar-nav .nav-item.active{background:linear-gradient(135deg,#eff6ff,#eef2ff)!important;color:#1e40af!important;font-weight:800!important}.admin-sidebar-nav .nav-item.active:before{background:#1e40af!important}.admin-sidebar-nav .nav-item.active i{color:#1e40af!important;opacity:1!important}
.admin-sidebar-nav .home-group,.admin-sidebar-nav .about-group{margin-bottom:9px}.admin-sidebar-nav .home-group .nav-item,.admin-sidebar-nav .about-group .nav-item{height:38px;border-radius:13px!important;font-weight:800!important}
.admin-sidebar-nav .nav-group:not(.collapsed) .chevron{transform:rotate(0deg)!important}.admin-sidebar-nav .nav-group.collapsed .chevron{transform:rotate(-90deg)!important}.admin-sidebar-nav .nav-group.collapsed .nav-items{display:none!important}
</style>
</head>
<body style="display:none">

<div class="layout">

    <nav class="sidebar-nav admin-sidebar-nav" id="sidebarNav">
      <div class="nav-group home-group">

        </div>
      </div>

      <div class="nav-group">
        <div class="nav-group-title" onclick="toggleGroup(this)">
          <i class="fas fa-server"></i><span>设备运营</span><em>核心</em><i class="fas fa-chevron-down chevron"></i>

          <div class="nav-item is-disabled" data-disabled="1" data-page="device_group" data-title="设备分组" data-icon="fa-layer-group" aria-disabled="true"><i class="fas fa-layer-group"></i><span>设备分组</span><small class="nav-status">开发中</small></div>
        </div>
      </div>

      <div class="nav-group">
        <div class="nav-group-title" onclick="toggleGroup(this)">
          <i class="fas fa-chart-simple"></i><span>数据与告警</span><i class="fas fa-chevron-down chevron"></i>
        </div>
        <div class="nav-items">
          <div class="nav-item" data-page="realtime" data-title="实时数据" data-icon="fa-wave-square"><i class="fas fa-wave-square"></i><span>实时数据</span></div>
          <div class="nav-item" data-page="history" data-title="历史数据" data-icon="fa-clock-rotate-left"><i class="fas fa-clock-rotate-left"></i><span>历史数据</span></div>
          <div class="nav-item is-disabled" data-disabled="1" data-page="alarm" data-title="告警记录" data-icon="fa-triangle-exclamation" aria-disabled="true"><i class="fas fa-triangle-exclamation"></i><span>告警记录</span><small class="nav-status">开发中</small></div>
        </div>
      </div>

      <div class="nav-group">
        <div class="nav-group-title" onclick="toggleGroup(this)">
          <i class="fas fa-users-gear"></i><span>用户与权限</span><i class="fas fa-chevron-down chevron"></i>
        </div>
        <div class="nav-items">
          <div class="nav-item" data-page="user_manage" data-title="用户列表" data-icon="fa-users"><i class="fas fa-users"></i><span>用户列表</span></div>
          <div class="nav-item is-disabled" data-disabled="1" data-page="user_add" data-title="添加用户" data-icon="fa-user-plus" aria-disabled="true"><i class="fas fa-user-plus"></i><span>添加用户</span><small class="nav-status">开发中</small></div>
          <div class="nav-item is-disabled" data-disabled="1" data-page="role" data-title="角色权限" data-icon="fa-shield-halved" aria-disabled="true"><i class="fas fa-shield-halved"></i><span>角色权限</span><small class="nav-status">开发中</small></div>
        </div>
      </div>

      <div class="nav-group">
        <div class="nav-group-title" onclick="toggleGroup(this)">
          <i class="fas fa-plug-circle-bolt"></i><span>接入配置</span><i class="fas fa-chevron-down chevron"></i>
        </div>
        <div class="nav-items">
          <div class="nav-item" data-page="mqtt" data-title="MQTT配置" data-icon="fa-tower-broadcast"><i class="fas fa-tower-broadcast"></i><span>MQTT配置</span></div>
          <div class="nav-item" data-page="llm_settings" data-title="大模型设置" data-icon="fa-robot"><i class="fas fa-robot"></i><span>大模型设置</span></div>
          <div class="nav-item" data-page="weather_settings" data-title="天气配置" data-icon="fa-cloud-sun"><i class="fas fa-cloud-sun"></i><span>天气配置</span></div>
        </div>
      </div>

      <div class="nav-group">
        <div class="nav-group-title" onclick="toggleGroup(this)">
          <i class="fas fa-sliders"></i><span>系统管理</span><i class="fas fa-chevron-down chevron"></i>
        </div>
        <div class="nav-items">
          <div class="nav-item is-disabled" data-disabled="1" data-page="site" data-title="站点设置" data-icon="fa-gears" aria-disabled="true"><i class="fas fa-gears"></i><span>站点设置</span><small class="nav-status">开发中</small></div>
          <div class="nav-item" data-page="register_settings" data-title="注册设置" data-icon="fa-user-gear"><i class="fas fa-user-gear"></i><span>注册设置</span></div>
          <div class="nav-item" data-page="account" data-title="账号设置" data-icon="fa-user-shield"><i class="fas fa-user-shield"></i><span>账号设置</span></div>
          <div class="nav-item" data-page="database" data-title="数据库" data-icon="fa-database"><i class="fas fa-database"></i><span>数据库</span></div>
          <div class="nav-item" data-page="firmware" data-title="版本管理" data-icon="fa-cloud-arrow-up"><i class="fas fa-cloud-arrow-up"></i><span>版本管理</span></div>
        </div>
      </div>

      <div class="nav-group about-group">
        <div class="nav-items">
          <div class="nav-item is-disabled" data-disabled="1" data-page="about" data-title="关于" data-icon="fa-circle-info" aria-disabled="true"><i class="fas fa-circle-info"></i><span>关于</span><small class="nav-status">开发中</small></div>
        </div>
      </div>
    </nav>
  </aside>

  <!-- Main -->
  <div class="main">
    <header class="header">
      <button class="btn-toggle" id="btnToggle"><i class="fas fa-bars"></i></button>
      <button class="header-btn" onclick="window.open('/','_blank')" title="访问前台"><i class="fas fa-house"></i></button>
      <div class="header-right">
        <button class="header-btn" onclick="refreshCurrent()" title="刷新"><i class="fas fa-rotate-right"></i></button>
        <button class="header-btn" onclick="clearCache()" title="清理缓存"><i class="fas fa-trash-can"></i></button>
        <button class="header-btn fullscreen-btn" onclick="toggleFullscreen()" title="全屏"><i class="fas fa-expand"></i></button>
        <button class="header-btn" onclick="toggleThemePanel()" title="主题设置"><i class="fas fa-palette"></i></button>
        <div class="user-menu">
          <button class="user-btn" onclick="toggleUserMenu(event)">
            <div class="user-avatar"><i class="fas fa-user-shield"></i></div>
            <span id="headerUsername">Admin</span>
            <i class="fas fa-chevron-down" style="font-size:9px;color:#b0b8c8"></i>
          </button>
          <div class="user-dropdown" id="userDropdown">
            <a href="#" onclick="openTab('account','账号设置','fa-shield-halved')"><i class="fas fa-user-gear"></i>账号设置</a>
            <a href="/user"><i class="fas fa-house-user"></i>用户后台</a>
            <a href="#" onclick="doLogout()"><i class="fas fa-right-from-bracket"></i>退出登录</a>
          </div>
        </div>
      </div>
    </header>

<script>
// Update username in header
function updateHeaderUser() {
  if (window.__currentUser) {
    document.getElementById('headerUsername').textContent = window.__currentUser.username;
  }
}
updateHeaderUser();
setTimeout(updateHeaderUser, 500);

async function doLogout() {
  await fetch('/api/logout', { method: 'POST' });
  window.location.href = '/admin/login';
}
</script>

    <div class="tab-bar">
      <div class="tab-list" id="tabList"></div>
      <div class="tab-bar-right">
        <div class="tab-dropdown-wrap">
          <button class="tab-bar-btn" id="tabDropBtn" title="标签操作"><i class="fas fa-chevron-down"></i></button>
          <div class="tab-dropdown" id="tabDropMenu">
            <a href="javascript:;" onclick="closeTab(activeTab);closeDropMenu()"><i class="fas fa-xmark"></i>关闭当前</a>
            <a href="javascript:;" onclick="closeOtherTabs();closeDropMenu()"><i class="fas fa-xmark"></i>关闭其他</a>
            <a href="javascript:;" onclick="closeAllTabs();closeDropMenu()"><i class="fas fa-trash"></i>关闭全部</a>
          </div>
        </div>
      </div>
    </div>

    <div class="content" id="contentArea"></div>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<!-- Confirm Dialog -->
<div class="confirm-overlay" id="confirmOverlay">
  <div class="confirm-box" id="confirmBox">
    <div class="confirm-icon" id="confirmIcon"><i class="fas fa-question"></i></div>
    <h3 class="confirm-title" id="confirmTitle"></h3>
    <p class="confirm-msg" id="confirmMsg"></p>
    <div class="confirm-actions">
      <button class="confirm-btn confirm-cancel" id="confirmCancel">取消</button>
      <button class="confirm-btn confirm-ok" id="confirmOk">确定</button>
    </div>
  </div>
</div>

<!-- Modal -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal-box" id="modalBox">
    <div class="modal-header">
      <div class="modal-title" id="modalTitle"></div>
      <button class="modal-fullscreen icon-desktop" id="modalFullscreen" title="全屏"><i class="fas fa-expand"></i></button>
      <button class="modal-close" id="modalClose"><i class="fas fa-chevron-down icon-mobile"></i><i class="fas fa-xmark icon-desktop"></i></button>
    </div>
    <div class="modal-body">
      <iframe class="modal-iframe" id="modalIframe"></iframe>
      <div class="modal-loading" id="modalLoading">
        <div class="modal-spinner"></div>
        <span>加载中...</span>
      </div>
    </div>
  </div>
</div>

<div class="tab-context-menu" id="tabContextMenu">
  <a href="javascript:;" onclick="closeTab(contextTabId)">关闭当前</a>
  <a href="javascript:;" onclick="closeOtherTabs()">关闭其他</a>
  <a href="javascript:;" onclick="closeAllTabs()">关闭全部</a>
</div>

<!-- Theme Panel -->
<div class="theme-overlay" id="themeOverlay" onclick="toggleThemePanel()"></div>
<div class="theme-panel" id="themePanel">
  <div class="theme-panel-hd">
    <h3><i class="fas fa-palette"></i> 主题设置</h3>
    <button class="theme-panel-close" onclick="toggleThemePanel()"><i class="fas fa-xmark"></i></button>
  </div>
  <div class="theme-panel-body">
    <div class="theme-sec">
      <div class="theme-sec-title">主题模式</div>
      <div class="theme-mode-grid">
        <button class="theme-mode-btn active" data-mode="light" onclick="setThemeMode('light')">
          <i class="mi fas fa-sun"></i><span class="ml">浅色</span>
        </button>
        <button class="theme-mode-btn" data-mode="dark" onclick="setThemeMode('dark')">
          <i class="mi fas fa-moon"></i><span class="ml">深色</span>
        </button>
      </div>
    </div>
    <div class="theme-sec">
      <div class="theme-sec-title">头部颜色</div>
      <div class="color-grid">
        <button class="color-btn active" style="background:#fff" data-header-color="default" onclick="setHeaderColor('default')"></button>
        <button class="color-btn" style="background:#1e40af" data-header-color="blue" onclick="setHeaderColor('blue')"></button>
        <button class="color-btn" style="background:#1e293b" data-header-color="dark" onclick="setHeaderColor('dark')"></button>
        <button class="color-btn" style="background:#7c3aed" data-header-color="purple" onclick="setHeaderColor('purple')"></button>
        <button class="color-btn" style="background:#059669" data-header-color="green" onclick="setHeaderColor('green')"></button>
      </div>
    </div>
    <div class="theme-sec">
      <div class="theme-sec-title">侧栏颜色</div>
      <div class="color-grid">
        <button class="color-btn active" style="background:#fff" data-sidebar-color="default" onclick="setSidebarColor('default')"></button>
        <button class="color-btn" style="background:#1e293b" data-sidebar-color="blue" onclick="setSidebarColor('blue')"></button>
        <button class="color-btn" style="background:#0f172a" data-sidebar-color="dark" onclick="setSidebarColor('dark')"></button>
        <button class="color-btn" style="background:#374151" data-sidebar-color="gray" onclick="setSidebarColor('gray')"></button>
      </div>
    </div>
    <button class="theme-reset-btn" onclick="resetTheme()"><i class="fas fa-rotate-left"></i> 恢复默认设置</button>
  </div>
</div>

<script src="/admin/admin.js"></script>
<script>initDefaultTab();</script>
</body>
</html>
