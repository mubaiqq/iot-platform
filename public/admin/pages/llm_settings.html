<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>大模型设置</title>
<link rel="stylesheet" href="https://cdn.bootcdn.net/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<link href="https://fonts.loli.net/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',-apple-system,sans-serif;background:#f5f6fa;color:#1e293b;padding:20px 18px 80px;min-height:100vh}
.page-header{margin-bottom:20px}
.page-header h1{font-size:18px;font-weight:700;color:#1e293b;margin-bottom:3px}
.page-header p{font-size:12px;color:#8892a4}

.card{background:#fff;border-radius:14px;border:1px solid #eef0f4;padding:24px;margin-bottom:20px}
.card-title{font-size:15px;font-weight:700;color:#1e293b;margin-bottom:18px;display:flex;align-items:center;gap:8px}
.card-title i{color:#3b82f6}

.form-row{display:flex;gap:14px;margin-bottom:14px;flex-wrap:wrap}
.form-group{flex:1;min-width:200px}
.form-label{display:block;font-size:12px;font-weight:600;color:#475569;margin-bottom:6px}
.form-input,.form-select{
  width:100%;padding:10px 14px;border:1.5px solid #e2e8f0;
  border-radius:10px;font-size:13px;font-family:inherit;color:#1e293b;background:#fff;
}
.form-input:focus,.form-select:focus{outline:none;border-color:#3b82f6;box-shadow:0 0 0 3px rgba(59,130,246,.1)}
.form-input::placeholder{color:#b0b8c8}
.model-input-wrap{position:relative}
.model-input-wrap .form-input{padding-right:80px}
.model-fetch-btn{
  position:absolute;right:4px;top:4px;bottom:4px;padding:0 12px;
  border:none;border-radius:8px;background:#3b82f6;color:#fff;
  font-size:11px;font-weight:600;font-family:inherit;cursor:pointer;transition:all .15s;
  white-space:nowrap;
}
.model-fetch-btn:hover{background:#2563eb}
.model-fetch-btn:disabled{background:#94a3b8;cursor:not-allowed}
.model-input-wrap .model-dropdown{
  position:absolute;top:100%;left:0;right:0;z-index:100;
  background:#fff;border:1.5px solid #e2e8f0;border-radius:10px;
  max-height:200px;overflow-y:auto;display:none;
  box-shadow:0 8px 24px rgba(0,0,0,.1);
}
.model-input-wrap .model-dropdown.show{display:block}
.model-dropdown-item{
  padding:8px 14px;font-size:13px;cursor:pointer;color:#475569;
}
.model-dropdown-item:hover{background:#f0f4ff;color:#3b82f6}
.model-dropdown-item.selected{background:#eff6ff;color:#3b82f6;font-weight:600}

.btn-row{display:flex;gap:10px;margin-top:6px;flex-wrap:wrap}
.btn{
  padding:10px 20px;border:none;border-radius:10px;
  font-size:13px;font-weight:600;font-family:inherit;cursor:pointer;transition:all .2s;
  display:inline-flex;align-items:center;gap:6px;
}
.btn-primary{background:#3b82f6;color:#fff}
.btn-primary:hover{background:#2563eb}
.btn-test{background:#8b5cf6;color:#fff}
.btn-test:hover{background:#7c3aed}
.btn-test:disabled{background:#c4b5fd;cursor:not-allowed}
.btn-reset{background:#f1f5f9;color:#64748b}
.btn-reset:hover{background:#e2e8f0}

.test-result{
  margin-top:14px;padding:14px;border-radius:10px;font-size:13px;
  display:none;white-space:pre-wrap;word-break:break-all;line-height:1.6;
}
.test-result.show{display:block}
.test-result.success{background:#ecfdf5;color:#065f46;border:1px solid #a7f3d0}
.test-result.error{background:#fef2f2;color:#991b1b;border:1px solid #fecaca}
.test-result .label{font-weight:600;margin-bottom:4px}

/* Config list */
.config-card{background:#fff;border-radius:14px;border:1px solid #eef0f4;overflow:hidden}
.config-table{width:100%;border-collapse:collapse}
.config-table th{
  text-align:left;padding:12px 16px;font-size:11px;font-weight:600;
  color:#94a3b8;text-transform:uppercase;letter-spacing:.5px;
  border-bottom:1px solid #eef0f4;background:#fafbfc;
}
.config-table td{padding:12px 16px;font-size:13px;color:#475569;border-bottom:1px solid #f5f6fa}
.config-table tr:hover td{background:#fafbfc}
.config-name{font-weight:600;color:#1e293b}
.config-url{font-size:12px;color:#64748b;max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.config-model{font-size:12px;background:#eef2ff;color:#4f46e5;padding:2px 8px;border-radius:6px;display:inline-block}
.config-key{font-size:12px;color:#94a3b8}

.badge{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:6px;font-size:11px;font-weight:600}
.badge-default{background:#ecfdf5;color:#059669}
.badge-normal{background:#f1f5f9;color:#64748b}

.actions{display:flex;gap:6px}
.btn-sm{
  padding:6px 12px;border:none;border-radius:7px;
  font-size:11px;font-weight:600;font-family:inherit;
  cursor:pointer;transition:all .15s;display:inline-flex;align-items:center;gap:4px;
}
.btn-sm-test{background:#f3e8ff;color:#7c3aed}
.btn-sm-test:hover{background:#e9d5ff}
.btn-sm-edit{background:#eef2ff;color:#4f46e5}
.btn-sm-edit:hover{background:#dbeafe}
.btn-sm-default{background:#ecfdf5;color:#059669}
.btn-sm-default:hover{background:#a7f3d0}
.btn-sm-default.active{background:#059669;color:#fff}
.btn-sm-delete{background:#fef2f2;color:#dc2626}
.btn-sm-delete:hover{background:#fecaca}

.empty-state{
  padding:50px 20px;text-align:center;
}
.empty-state i{font-size:40px;color:#e2e8f0;margin-bottom:12px}
.empty-state h3{font-size:14px;color:#94a3b8;font-weight:600;margin-bottom:4px}
.empty-state p{font-size:12px;color:#b0b8c8}

.toast-msg{
  position:fixed;top:20px;left:50%;transform:translateX(-50%);
  padding:12px 24px;border-radius:10px;font-size:13px;font-weight:500;
  z-index:9999;display:none;align-items:center;gap:8px;
  box-shadow:0 6px 20px rgba(0,0,0,.1);
}
.toast-msg.show{display:flex}
.toast-msg.success{background:#ecfdf5;color:#059669;border:1px solid #a7f3d0}
.toast-msg.error{background:#fef2f2;color:#dc2626;border:1px solid #fecaca}

/* Modal for edit */
.modal-overlay{
  display:none;position:fixed;inset:0;z-index:2000;
  background:rgba(15,23,42,.45);backdrop-filter:blur(2px);
  align-items:center;justify-content:center;
}
.modal-overlay.show{display:flex}
.modal-box{
  background:#fff;border-radius:16px;width:90vw;max-width:520px;
  box-shadow:0 20px 60px rgba(0,0,0,.2);overflow:hidden;
  animation:slideUp .2s ease-out;
}
@keyframes slideUp{from{transform:translateY(20px);opacity:0}to{transform:translateY(0);opacity:1}}
.modal-header{
  padding:16px 20px;border-bottom:1px solid #eef0f4;
  display:flex;align-items:center;justify-content:space-between;
}
.modal-title{font-size:15px;font-weight:700;color:#1e293b}
.modal-close{
  width:32px;height:32px;border:none;background:transparent;
  color:#94a3b8;border-radius:8px;cursor:pointer;font-size:16px;
}
.modal-close:hover{background:#f0f2f8;color:#475569}
.modal-body{padding:20px}
.modal-footer{padding:16px 20px;border-top:1px solid #eef0f4;display:flex;justify-content:flex-end;gap:10px}
.btn-cancel{background:#f1f5f9;color:#64748b}
.btn-cancel:hover{background:#e2e8f0}
.btn-save{background:#3b82f6;color:#fff}
.btn-save:hover{background:#2563eb}

@media(max-width:768px){
  .form-row{flex-direction:column}
  .form-group{min-width:0}
  .card{padding:16px}
  .config-card{overflow-x:auto;-webkit-overflow-scrolling:touch}
  .config-table{font-size:12px;min-width:650px}
  .config-table td,.config-table th{padding:8px 10px;white-space:nowrap}
  .actions{flex-wrap:nowrap}
  .btn-sm{padding:5px 8px;font-size:10px}
  input,select,textarea{font-size:16px!important}
  .model-fetch-btn{font-size:10px;padding:0 8px}
}
</style>
</head>
<body>

<div class="page-header">
  <div>
    <h1><i class="fas fa-robot" style="color:#3b82f6;margin-right:8px"></i>大模型设置</h1>
    <p>系统设置 · 配置官方大模型 API 接口</p>
  </div>
</div>

<div class="toast-msg" id="toastMsg">
  <i class="fas fa-check-circle"></i>
  <span id="toastText"></span>
</div>

<!-- Add Form -->
<div class="card" id="formCard">
  <div class="card-title"><i class="fas fa-plus-circle"></i> 添加模型配置</div>
  <div class="form-row">
    <div class="form-group">
      <label class="form-label">自定义名称</label>
      <input type="text" class="form-input" id="cfgName" placeholder="如：GPT-4o、DeepSeek V3">
    </div>
    <div class="form-group">
      <label class="form-label">API 地址</label>
      <input type="text" class="form-input" id="cfgUrl" placeholder="如：https://api.openai.com/v1">
    </div>
  </div>
  <div class="form-row">
    <div class="form-group">
      <label class="form-label">API Key</label>
      <input type="password" class="form-input" id="cfgKey" placeholder="sk-xxxxxx">
    </div>
    <div class="form-group">
      <label class="form-label">模型 ID</label>
      <div class="model-input-wrap">
        <input type="text" class="form-input" id="cfgModel" placeholder="点击右侧获取或手动输入">
        <button class="model-fetch-btn" id="fetchBtn" onclick="fetchModels()"><i class="fas fa-download"></i> 获取</button>
        <div class="model-dropdown" id="modelDropdown"></div>
      </div>
    </div>
  </div>
  <div class="btn-row">
    <button class="btn btn-primary" onclick="addConfig()"><i class="fas fa-plus"></i> 添加</button>
    <button class="btn btn-test" id="testBtn" onclick="testConfig()"><i class="fas fa-vial"></i> 测试</button>
    <button class="btn btn-reset" onclick="resetForm()"><i class="fas fa-rotate-left"></i> 重置</button>
  </div>
  <div class="test-result" id="testResult">
    <div class="label" id="testResultLabel"></div>
    <div id="testResultContent"></div>
  </div>
</div>

<!-- Config List -->
<div class="config-card" id="configList">
  <div style="padding:16px 16px 0"><div class="card-title" style="margin-bottom:0"><i class="fas fa-list"></i> 已配置模型</div></div>
  <table class="config-table">
    <thead>
      <tr>
        <th>名称</th>
        <th>API 地址</th>
        <th>模型 ID</th>
        <th>API Key</th>
        <th>状态</th>
        <th>操作</th>
      </tr>
    </thead>
    <tbody id="configTableBody"></tbody>
  </table>
  <div class="empty-state" id="emptyState" style="display:none">
    <i class="fas fa-robot"></i>
    <h3>暂无模型配置</h3>
    <p>在上方表单中添加第一个大模型配置</p>
  </div>
</div>

<!-- Edit Modal -->
<div class="modal-overlay" id="editModal">
  <div class="modal-box">
    <div class="modal-header">
      <div class="modal-title">编辑模型配置</div>
      <button class="modal-close" onclick="closeEditModal()"><i class="fas fa-xmark"></i></button>
    </div>
    <div class="modal-body">
      <input type="hidden" id="editId">
      <div class="form-group" style="margin-bottom:14px">
        <label class="form-label">自定义名称</label>
        <input type="text" class="form-input" id="editName">
      </div>
      <div class="form-group" style="margin-bottom:14px">
        <label class="form-label">API 地址</label>
        <input type="text" class="form-input" id="editUrl">
      </div>
      <div class="form-group" style="margin-bottom:14px">
        <label class="form-label">API Key</label>
        <input type="password" class="form-input" id="editKey">
      </div>
      <div class="form-group">
        <label class="form-label">模型 ID</label>
        <input type="text" class="form-input" id="editModel">
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-cancel" onclick="closeEditModal()">取消</button>
      <button class="btn btn-save" onclick="saveEdit()">保存</button>
    </div>
  </div>
</div>

<script>
const API_BASE = '/api/admin/llm-configs';
let fetchedModels = [];

function showToast(msg, type) {
  const el = document.getElementById('toastMsg');
  el.className = 'toast-msg show ' + (type || 'success');
  document.getElementById('toastText').textContent = msg;
  setTimeout(() => el.classList.remove('show'), 2500);
}

function maskKey(key) {
  if (!key || key.length < 10) return '***';
  return key.slice(0, 6) + '***' + key.slice(-4);
}

// ========== Fetch Models ==========
async function fetchModels() {
  const url = document.getElementById('cfgUrl').value.trim();
  const key = document.getElementById('cfgKey').value.trim();
  if (!url || !key) { showToast('请先填写 API 地址和 Key', 'error'); return; }

  const btn = document.getElementById('fetchBtn');
  btn.disabled = true;
  btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i>';

  try {
    const res = await fetch('/api/llm-models', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ api_url: url, api_key: key })
    });
    const data = await res.json();
    if (data.success && data.models.length) {
      fetchedModels = data.models;
      showModelDropdown(data.models);
      showToast(`获取到 ${data.models.length} 个模型`, 'success');
    } else {
      showToast(data.error || '未获取到模型', 'error');
    }
  } catch (e) {
    showToast('请求失败: ' + e.message, 'error');
  } finally {
    btn.disabled = false;
    btn.innerHTML = '<i class="fas fa-download"></i> 获取';
  }
}

function showModelDropdown(models) {
  const dd = document.getElementById('modelDropdown');
  dd.innerHTML = models.map(m => `<div class="model-dropdown-item" onclick="selectModel('${m}')">${m}</div>`).join('');
  dd.classList.add('show');
}

function selectModel(id) {
  document.getElementById('cfgModel').value = id;
  document.getElementById('modelDropdown').classList.remove('show');
}

// Close dropdown when clicking outside
document.addEventListener('click', e => {
  if (!e.target.closest('.model-input-wrap')) {
    document.getElementById('modelDropdown').classList.remove('show');
  }
});

// ========== Test Config ==========
async function testConfig() {
  const url = document.getElementById('cfgUrl').value.trim();
  const key = document.getElementById('cfgKey').value.trim();
  const model = document.getElementById('cfgModel').value.trim();
  if (!url || !key || !model) { showToast('请填写完整信息后再测试', 'error'); return; }

  const btn = document.getElementById('testBtn');
  btn.disabled = true;
  btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> 测试中...';

  const resultEl = document.getElementById('testResult');
  const labelEl = document.getElementById('testResultLabel');
  const contentEl = document.getElementById('testResultContent');
  resultEl.className = 'test-result show';
  labelEl.textContent = '⏳ 正在测试...';
  contentEl.textContent = '发送「你好」到 ' + model + '，请稍候...';
  resultEl.style.background = '#f0f4ff';
  resultEl.style.borderColor = '#c7d2fe';
  resultEl.style.color = '#4f46e5';

  try {
    const res = await fetch('/api/llm-test', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ api_url: url, api_key: key, model_id: model })
    });
    const data = await res.json();
    if (data.success) {
      resultEl.className = 'test-result show success';
      labelEl.textContent = '✅ 测试成功';
      contentEl.textContent = data.reply;
    } else {
      resultEl.className = 'test-result show error';
      labelEl.textContent = '❌ 测试失败';
      contentEl.textContent = data.error;
    }
  } catch (e) {
    resultEl.className = 'test-result show error';
    labelEl.textContent = '❌ 请求异常';
    contentEl.textContent = e.message;
  } finally {
    btn.disabled = false;
    btn.innerHTML = '<i class="fas fa-vial"></i> 测试';
  }
}

// ========== Add Config ==========
async function addConfig() {
  const name = document.getElementById('cfgName').value.trim();
  const url = document.getElementById('cfgUrl').value.trim();
  const key = document.getElementById('cfgKey').value.trim();
  const model = document.getElementById('cfgModel').value.trim();
  if (!name || !url || !key || !model) { showToast('所有字段必填', 'error'); return; }

  try {
    const res = await fetch(API_BASE, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ name, api_url: url, api_key: key, model_id: model })
    });
    const data = await res.json();
    if (data.id) {
      showToast('添加成功' + (data.is_default ? '（已设为默认）' : ''), 'success');
      resetForm();
      loadConfigs();
    } else {
      showToast(data.error || '添加失败', 'error');
    }
  } catch (e) {
    showToast('网络错误', 'error');
  }
}

function resetForm() {
  document.getElementById('cfgName').value = '';
  document.getElementById('cfgUrl').value = '';
  document.getElementById('cfgKey').value = '';
  document.getElementById('cfgModel').value = '';
  document.getElementById('testResult').className = 'test-result';
  document.getElementById('modelDropdown').classList.remove('show');
}

// ========== Load List ==========
async function loadConfigs() {
  try {
    const res = await fetch(API_BASE);
    const data = await res.json();
    renderConfigs(data.configs || []);
  } catch (e) {
    showToast('加载失败', 'error');
  }
}

function renderConfigs(configs) {
  const tbody = document.getElementById('configTableBody');
  const empty = document.getElementById('emptyState');
  if (!configs.length) {
    tbody.innerHTML = '';
    empty.style.display = '';
    return;
  }
  empty.style.display = 'none';
  tbody.innerHTML = configs.map(c => `
    <tr>
      <td><span class="config-name">${c.name}</span></td>
      <td><span class="config-url" title="${c.api_url}">${c.api_url}</span></td>
      <td><span class="config-model">${c.model_id}</span></td>
      <td><span class="config-key">${maskKey(c.api_key)}</span></td>
      <td>
        ${c.is_default
          ? '<span class="badge badge-default"><i class="fas fa-check"></i> 默认</span>'
          : '<span class="badge badge-normal">普通</span>'}
      </td>
      <td>
        <div class="actions">
          <button class="btn-sm btn-sm-edit" onclick='editConfig(${JSON.stringify(c)})'><i class="fas fa-pen"></i> 编辑</button>
          <button class="btn-sm btn-sm-test" onclick="testSaved(${c.id})"><i class="fas fa-vial"></i> 测试</button>
          <button class="btn-sm btn-sm-default ${c.is_default?'active':''}" onclick="setDefault(${c.id})" ${c.is_default?'disabled':''}>
            <i class="fas fa-star"></i> ${c.is_default?'默认':'设为默认'}
          </button>
          <button class="btn-sm btn-sm-delete" onclick="deleteConfig(${c.id},'${c.name}')"><i class="fas fa-trash"></i> 删除</button>
        </div>
      </td>
    </tr>
  `).join('');
}

// ========== Edit ==========
function editConfig(c) {
  document.getElementById('editId').value = c.id;
  document.getElementById('editName').value = c.name;
  document.getElementById('editUrl').value = c.api_url;
  document.getElementById('editKey').value = c.api_key;
  document.getElementById('editModel').value = c.model_id;
  document.getElementById('editModal').classList.add('show');
}

function closeEditModal() {
  document.getElementById('editModal').classList.remove('show');
}

async function saveEdit() {
  const id = document.getElementById('editId').value;
  const name = document.getElementById('editName').value.trim();
  const url = document.getElementById('editUrl').value.trim();
  const key = document.getElementById('editKey').value.trim();
  const model = document.getElementById('editModel').value.trim();
  if (!name || !url || !key || !model) { showToast('所有字段必填', 'error'); return; }

  try {
    const res = await fetch(`${API_BASE}/${id}`, {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ name, api_url: url, api_key: key, model_id: model })
    });
    const data = await res.json();
    if (data.success) {
      showToast('保存成功', 'success');
      closeEditModal();
      loadConfigs();
    } else {
      showToast('保存失败', 'error');
    }
  } catch (e) {
    showToast('网络错误', 'error');
  }
}

// ========== Test Saved ==========
async function testSaved(id) {
  try {
    const res = await fetch(API_BASE);
    const data = await res.json();
    const cfg = (data.configs || []).find(c => c.id === id);
    if (!cfg) { showToast('未找到配置', 'error'); return; }

    showToast('正在测试...', 'success');
    const testRes = await fetch('/api/llm-test', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ api_url: cfg.api_url, api_key: cfg.api_key, model_id: cfg.model_id })
    });
    const testData = await testRes.json();
    if (testData.success) {
      showToast(`测试成功: ${testData.reply.slice(0, 50)}`, 'success');
    } else {
      showToast(`测试失败: ${testData.error}`, 'error');
    }
  } catch (e) {
    showToast('请求异常: ' + e.message, 'error');
  }
}

// ========== Set Default ==========
async function setDefault(id) {
  try {
    const res = await fetch(`${API_BASE}/${id}/default`, { method: 'PUT' });
    const data = await res.json();
    if (data.success) { showToast('已设为默认', 'success'); loadConfigs(); }
  } catch (e) { showToast('操作失败', 'error'); }
}

// ========== Delete ==========
async function deleteConfig(id, name) {
  if (!confirm(`确定删除「${name}」？`)) return;
  try {
    const res = await fetch(`${API_BASE}/${id}`, { method: 'DELETE' });
    const data = await res.json();
    if (data.success) { showToast('已删除', 'success'); loadConfigs(); }
  } catch (e) { showToast('删除失败', 'error'); }
}

// Init
loadConfigs();
</script>
