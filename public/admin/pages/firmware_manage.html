<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>版本管理</title>
<link rel="stylesheet" href="https://cdn.bootcdn.net/ajax/libs/font-awesome/6.5.1/css/all.min.css" media="print" onload="this.media='all'"><noscript><link rel="stylesheet" href="https://cdn.bootcdn.net/ajax/libs/font-awesome/6.5.1/css/all.min.css"></noscript>
<style>
*{box-sizing:border-box}html,body{max-width:100%;overflow-x:hidden}body{margin:0;background:#f5f7fb;color:#172033;font-family:Inter,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;padding:20px}.page{max-width:1440px;margin:0 auto}.page-head{display:flex;align-items:flex-end;justify-content:space-between;gap:18px;margin-bottom:16px}.page-title h1{font-size:21px;margin:0;font-weight:800;letter-spacing:-.35px}.page-title h1 i{color:#3478f6;margin-right:8px}.page-title p{margin:5px 0 0;font-size:12px;color:#8490a3}.head-stats{display:flex;align-items:center;gap:8px}.stat{background:#fff;border-radius:12px;padding:8px 13px;min-width:90px}.stat small{display:block;color:#94a3b8;font-size:9px}.stat b{display:block;font-size:15px;margin-top:2px}.desktop-layout{display:grid;grid-template-columns:minmax(340px,400px) minmax(0,1fr);gap:16px;align-items:start}.panel{background:#fff;border-radius:17px}.upload{padding:17px;position:sticky;top:16px}.panel-title{display:flex;align-items:center;gap:9px;margin-bottom:15px}.panel-icon{width:34px;height:34px;border-radius:11px;background:#eef5ff;color:#3478f6;display:grid;place-items:center}.panel-title h2{font-size:14px;margin:0}.panel-title p{font-size:10px;color:#94a3b8;margin:3px 0 0}.form{display:grid;grid-template-columns:1fr 1fr;gap:12px}.field{min-width:0}.field.full{grid-column:1/-1}.field label{display:block;font-size:10px;font-weight:700;color:#64748b;margin-bottom:6px}.req{color:#ef4444}.control{width:100%;border:0;border-radius:11px;background:#f1f5f9;padding:0 12px;height:41px;color:#334155;font-family:inherit;font-size:13px;outline:none}.control:focus{background:#fff;box-shadow:0 0 0 2px rgba(52,120,246,.14)}.custom-select{position:relative}.select-trigger{display:flex;align-items:center;justify-content:space-between;text-align:left;cursor:pointer}.select-trigger i{font-size:10px;color:#94a3b8;transition:.18s}.custom-select.open .select-trigger i{transform:rotate(180deg)}.select-menu{position:absolute;z-index:50;left:0;right:0;top:47px;background:#fff;border-radius:11px;padding:5px;box-shadow:0 12px 30px rgba(30,41,59,.15);display:none}.custom-select.open .select-menu{display:block}.select-option{display:flex;align-items:center;justify-content:space-between;padding:10px;border-radius:8px;font-size:12px;color:#475569;cursor:pointer}.select-option:hover,.select-option.active{background:#eef5ff;color:#2563eb}.select-option i{font-size:10px}.native-select-value{position:absolute!important;width:1px!important;height:1px!important;opacity:0!important;pointer-events:none!important}.control:focus{background:#fff;box-shadow:0 0 0 2px rgba(52,120,246,.14)}textarea.control{height:112px;padding:11px 12px;resize:vertical;line-height:1.6}.file-picker{display:flex;align-items:center;gap:9px;background:#f1f5f9;border-radius:11px;padding:7px;min-height:48px;cursor:pointer}.file-picker input{position:absolute;opacity:0;pointer-events:none}.file-btn{background:#fff;color:#3478f6;border-radius:8px;padding:8px 11px;font-size:11px;font-weight:700;white-space:nowrap}.file-name{min-width:0;color:#8490a3;font-size:10px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}.help{font-size:9px;color:#94a3b8;line-height:1.5;margin-top:5px}.publish{width:100%;height:42px;border:0;border-radius:11px;background:#3478f6;color:#fff;font-size:12px;font-weight:750;font-family:inherit;cursor:pointer;transition:.18s}.publish:hover{background:#2563eb}.publish:disabled{opacity:.72;cursor:not-allowed}.versions{padding:0;overflow:hidden}.versions-head{display:flex;align-items:center;justify-content:space-between;padding:16px 17px 13px}.versions-head h2{font-size:14px;margin:0}.versions-head span{font-size:10px;color:#94a3b8}.filter-tabs{display:flex;gap:6px;padding:0 17px 13px}.filter-tab{border:0;border-radius:9px;background:#f1f5f9;color:#64748b;padding:7px 11px;font-size:10px;font-weight:700;cursor:pointer}.filter-tab.active{background:#3478f6;color:#fff}.version-table{width:100%;border-collapse:collapse}.version-table th{text-align:left;background:#fafbfd;color:#94a3b8;font-size:9px;font-weight:700;padding:10px 14px;white-space:nowrap}.version-table td{padding:13px 14px;border-top:1px solid #f1f4f8;vertical-align:middle;font-size:11px}.version-table tbody tr:hover td{background:#fafcff}.version-main{display:flex;align-items:center;gap:10px;min-width:170px}.version-icon{width:34px;height:34px;border-radius:11px;display:grid;place-items:center;background:#eef5ff;color:#3478f6;flex-shrink:0}.version-icon.sensor{background:#ecfdf5;color:#059669}.version-no{font-size:13px;font-weight:800;white-space:nowrap}.version-status{font-size:9px;color:#059669;margin-top:2px}.version-status.off{color:#94a3b8}.type-badge{display:inline-flex;padding:5px 8px;border-radius:20px;background:#eef5ff;color:#3478f6;font-size:9px;font-weight:750;white-space:nowrap}.type-badge.sensor{background:#ecfdf5;color:#059669}.notes-text{max-width:350px;color:#475569;line-height:1.5;white-space:pre-wrap;word-break:break-word}.file-info{color:#64748b;white-space:nowrap}.file-info small{display:block;color:#94a3b8;margin-top:3px}.date{color:#64748b;white-space:nowrap}.del{width:auto;border:0;border-radius:9px;background:#fee2e2;color:#dc2626;padding:8px 10px;font-size:10px;font-weight:700;cursor:pointer;white-space:nowrap}.empty{padding:58px 20px;text-align:center;color:#94a3b8}.empty i{display:block;font-size:30px;color:#dbe3ed;margin-bottom:10px}.empty b{display:block;font-size:13px;color:#64748b;margin-bottom:4px}.empty span{font-size:10px}.mobile-list{display:none;padding:0 12px 12px}.mobile-item{padding:13px 0;border-top:1px solid #f1f4f8}.mobile-top{display:flex;align-items:center;gap:9px}.mobile-main{min-width:0;flex:1}.mobile-notes{font-size:11px;color:#475569;line-height:1.55;margin:9px 0;white-space:pre-wrap}.mobile-meta{font-size:9px;color:#94a3b8;word-break:break-all;line-height:1.55}.mobile-actions{display:flex;align-items:center;justify-content:space-between;margin-top:9px}.toast{position:fixed;z-index:100;top:18px;left:50%;transform:translate(-50%,-12px);padding:10px 16px;border-radius:11px;background:#172033;color:#fff;font-size:12px;opacity:0;pointer-events:none;transition:.2s}.toast.show{opacity:1;transform:translate(-50%,0)}
@media(max-width:1050px) and (min-width:651px){.desktop-layout{grid-template-columns:330px minmax(0,1fr)}.version-table th:nth-child(4),.version-table td:nth-child(4){display:none}.notes-text{max-width:260px}}
@media(max-width:650px){body{padding:12px}.page-head{display:block;margin-bottom:12px}.page-title h1{font-size:18px}.head-stats{margin-top:10px}.stat{flex:1;min-width:0;padding:7px 9px}.desktop-layout{display:block}.upload{position:static;padding:14px}.panel-title{margin-bottom:12px}.form{display:block}.field{margin-bottom:10px}.control,.publish{font-size:16px!important}.file-picker{font-size:16px}.versions{margin-top:12px}.versions-head{padding:14px 13px 11px}.filter-tabs{padding:0 13px 11px}.version-table{display:none}.mobile-list{display:block}.mobile-item .del{font-size:12px}.notes-text{max-width:none}}
</style>
</head>
<body>
<div class="page">
 <div class="page-head"><div class="page-title"><h1><i class="fas fa-cloud-arrow-up"></i>固件版本管理</h1><p>上传、发布和停用控制器与传感器固件</p></div><div class="head-stats"><div class="stat"><small>全部版本</small><b id="statAll">--</b></div><div class="stat"><small>控制器</small><b id="statController">--</b></div><div class="stat"><small>传感器</small><b id="statSensor">--</b></div></div></div>
 <div class="desktop-layout">
  <section class="panel upload">
   <div class="panel-title"><div class="panel-icon"><i class="fas fa-upload"></i></div><div><h2>发布新版本</h2><p>上传编译完成的 ESP32 固件</p></div></div>
   <form id="form" class="form">
    <div class="field"><label>设备类型 <span class="req">*</span></label><div class="custom-select" id="targetTypeSelect"><button class="control select-trigger" type="button"><span id="targetTypeText">控制器</span><i class="fas fa-chevron-down"></i></button><div class="select-menu"><div class="select-option active" data-value="controller"><span><i class="fas fa-microchip"></i> 控制器</span><i class="fas fa-check"></i></div><div class="select-option" data-value="sensor"><span><i class="fas fa-satellite-dish"></i> 传感器</span></div></div><input class="native-select-value" type="hidden" name="target_type" value="controller"></div></div>
    <div class="field"><label>版本号 <span class="req">*</span></label><input class="control" name="version" placeholder="例如 1.2.3" required></div>
    <div class="field full"><label>固件文件 <span class="req">*</span></label><label class="file-picker"><input id="firmwareFile" type="file" name="firmware" accept=".bin" required><span class="file-btn"><i class="fas fa-folder-open"></i> 选择文件</span><span class="file-name" id="fileName">尚未选择 .bin 文件</span></label><div class="help">仅支持 ESP32 编译生成的 .bin 文件，最大 16MB</div></div>
    <div class="field full"><label>更新说明 <span class="req">*</span></label><textarea class="control" name="release_notes" required placeholder="说明新增功能、修复内容和升级注意事项"></textarea></div>
    <div class="field full"><button class="publish" id="submit"><i class="fas fa-upload"></i> 上传并发布</button></div>
   </form>
  </section>
  <section class="panel versions">
   <div class="versions-head"><h2>版本记录</h2><span id="recordTip">正在加载...</span></div>
   <div class="filter-tabs"><button class="filter-tab active" data-filter="all">全部</button><button class="filter-tab" data-filter="controller">控制器</button><button class="filter-tab" data-filter="sensor">传感器</button></div>
   <div id="tableWrap"></div><div class="mobile-list" id="mobileList"></div>
  </section>
 </div>
</div>
<div class="toast" id="toast"></div>
<script>
const esc=v=>String(v??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));let versions=[],filter='all';
function msg(t){toast.textContent=t;toast.classList.add('show');clearTimeout(toast._t);toast._t=setTimeout(()=>toast.classList.remove('show'),2500)}
function formatSize(bytes){const n=Number(bytes)||0;return n>=1048576?(n/1048576).toFixed(2)+' MB':(n/1024).toFixed(1)+' KB'}
const targetTypeSelect=document.getElementById('targetTypeSelect'),targetTypeInput=targetTypeSelect.querySelector('input[name="target_type"]'),targetTypeTrigger=targetTypeSelect.querySelector('.select-trigger');function setTargetType(value){targetTypeInput.value=value;targetTypeText.textContent=value==='sensor'?'传感器':'控制器';targetTypeSelect.querySelectorAll('.select-option').forEach(option=>{const active=option.dataset.value===value;option.classList.toggle('active',active);const oldCheck=option.querySelector(':scope > .fa-check');if(oldCheck)oldCheck.remove();if(active)option.insertAdjacentHTML('beforeend','<i class="fas fa-check"></i>')});targetTypeSelect.classList.remove('open')}targetTypeTrigger.onclick=e=>{e.stopPropagation();targetTypeSelect.classList.toggle('open')};targetTypeSelect.querySelector('.select-menu').onclick=e=>{e.stopPropagation();const option=e.target.closest('.select-option');if(option)setTargetType(option.dataset.value)};document.addEventListener('click',()=>targetTypeSelect.classList.remove('open'));
function render(){const rows=filter==='all'?versions:versions.filter(v=>v.target_type===filter);statAll.textContent=versions.length;statController.textContent=versions.filter(v=>v.target_type==='controller').length;statSensor.textContent=versions.filter(v=>v.target_type==='sensor').length;recordTip.textContent=`显示 ${rows.length} 个版本`;if(!rows.length){const empty='<div class="empty"><i class="fas fa-box-open"></i><b>暂无固件版本</b><span>上传新固件后将在这里显示</span></div>';tableWrap.innerHTML=empty;mobileList.innerHTML=empty;return}tableWrap.innerHTML=`<table class="version-table"><thead><tr><th>版本</th><th>设备类型</th><th>更新说明</th><th>文件与校验</th><th>发布时间</th><th>操作</th></tr></thead><tbody>${rows.map(v=>`<tr><td><div class="version-main"><div class="version-icon ${v.target_type==='sensor'?'sensor':''}"><i class="fas fa-${v.target_type==='sensor'?'satellite-dish':'microchip'}"></i></div><div><div class="version-no">v${esc(v.version)}</div><div class="version-status ${v.is_active?'':'off'}">${v.is_active?'正在使用':'已停用'}</div></div></div></td><td><span class="type-badge ${v.target_type==='sensor'?'sensor':''}">${v.target_type==='sensor'?'传感器':'控制器'}</span></td><td><div class="notes-text">${esc(v.release_notes)}</div></td><td><div class="file-info">${esc(v.file_name)}<small>${formatSize(v.file_size)} · SHA256 ${esc(String(v.sha256||'').slice(0,12))}…</small></div></td><td><div class="date">${new Date(v.created_at).toLocaleString('zh-CN',{hour12:false})}</div></td><td>${v.is_active?`<button class="del" onclick="disableVersion(${v.id})"><i class="fas fa-ban"></i> 停用</button>`:'<span class="type-badge">已停用</span>'}</td></tr>`).join('')}</tbody></table>`;mobileList.innerHTML=rows.map(v=>`<div class="mobile-item"><div class="mobile-top"><div class="version-icon ${v.target_type==='sensor'?'sensor':''}"><i class="fas fa-${v.target_type==='sensor'?'satellite-dish':'microchip'}"></i></div><div class="mobile-main"><div class="version-no">v${esc(v.version)}</div><div class="version-status ${v.is_active?'':'off'}">${v.target_type==='sensor'?'传感器':'控制器'} · ${v.is_active?'正在使用':'已停用'}</div></div></div><div class="mobile-notes">${esc(v.release_notes)}</div><div class="mobile-meta">${esc(v.file_name)} · ${formatSize(v.file_size)}<br>SHA256 ${esc(String(v.sha256||'').slice(0,16))}… · ${new Date(v.created_at).toLocaleString('zh-CN',{hour12:false})}</div>${v.is_active?`<div class="mobile-actions"><span></span><button class="del" onclick="disableVersion(${v.id})"><i class="fas fa-ban"></i> 停用</button></div>`:''}</div>`).join('')}
async function load(){try{const r=await fetch('/api/admin/firmware',{cache:'no-store'}),d=await r.json();if(!d.success)throw Error(d.error||'加载失败');versions=d.versions||[];render()}catch(e){recordTip.textContent='加载失败';msg(e.message||'版本加载失败')}}
document.querySelectorAll('.filter-tab').forEach(btn=>btn.onclick=()=>{filter=btn.dataset.filter;document.querySelectorAll('.filter-tab').forEach(x=>x.classList.toggle('active',x===btn));render()});
firmwareFile.onchange=()=>{const f=firmwareFile.files[0];fileName.textContent=f?`${f.name} · ${formatSize(f.size)}`:'尚未选择 .bin 文件'};
form.onsubmit=async e=>{e.preventDefault();submit.disabled=true;submit.innerHTML='<i class="fas fa-spinner fa-spin"></i> 上传中';try{const r=await fetch('/api/admin/firmware',{method:'POST',body:new FormData(form)}),d=await r.json();if(!d.success)throw Error(d.error);submit.style.background='#059669';submit.innerHTML='<i class="fas fa-check"></i> 发布成功';form.reset();setTargetType('controller');fileName.textContent='尚未选择 .bin 文件';load();setTimeout(()=>{submit.style.background='';submit.innerHTML='<i class="fas fa-upload"></i> 上传并发布'},2000)}catch(x){submit.style.background='#dc2626';submit.innerHTML='<i class="fas fa-xmark"></i> '+esc(x.message||'发布失败');setTimeout(()=>{submit.style.background='';submit.innerHTML='<i class="fas fa-upload"></i> 上传并发布'},2500)}finally{submit.disabled=false}};
async function disableVersion(id){const ok=await parent.showConfirm('停用版本','停用后用户和设备不能再下载该版本',{type:'danger'});if(!ok)return;const r=await fetch('/api/admin/firmware/'+id,{method:'DELETE'}),d=await r.json();if(!d.success)return msg(d.error||'停用失败');msg('版本已停用');load()}
load();
</script>
</body></html>
