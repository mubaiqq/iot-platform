<!DOCTYPE html>
<html lang="zh"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>实时数据</title><link rel="stylesheet" href="https://cdn.bootcdn.net/ajax/libs/font-awesome/6.5.1/css/all.min.css" media="print" onload="this.media='all'"><noscript><link rel="stylesheet" href="https://cdn.bootcdn.net/ajax/libs/font-awesome/6.5.1/css/all.min.css"></noscript><style>
*{box-sizing:border-box}body{margin:0;background:#f5f6fa;color:#1e293b;font-family:Inter,-apple-system,sans-serif;padding:18px;overflow-x:hidden}.head{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}.head h1{font-size:19px;margin:0}.live{font-size:11px;color:#059669}.dot{display:inline-block;width:7px;height:7px;border-radius:50%;background:#10b981;margin-right:6px;animation:p 1.5s infinite}@keyframes p{50%{opacity:.35}}.summary{display:grid;grid-template-columns:repeat(5,1fr);gap:9px;margin-bottom:14px}.sum,.device{background:#fff;border-radius:15px;padding:13px}.sum span{font-size:10px;color:#8490a3}.sum b{display:block;font-size:20px;margin-top:4px}.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(310px,1fr));gap:11px}.device-top{display:flex;align-items:center;gap:10px}.ico{width:37px;height:37px;border-radius:50%;display:grid;place-items:center;background:#eef5ff;color:#3478f6}.name{font-size:13px;font-weight:750}.code,.owner{font-size:10px;color:#94a3b8;margin-top:2px}.status{margin-left:auto;font-size:10px;padding:4px 8px;border-radius:20px;background:#ecfdf5;color:#059669}.status.off{background:#f1f5f9;color:#94a3b8}.metrics{display:flex;gap:7px;overflow:auto;margin-top:11px;scrollbar-width:none}.metric{min-width:82px;background:#f8fafc;border-radius:11px;padding:9px}.metric small{display:block;color:#8792a5;font-size:9px}.metric b{display:block;font-size:14px;margin-top:3px}.empty{text-align:center;background:#fff;border-radius:15px;padding:55px;color:#94a3b8}@media(min-width:601px){.grid{grid-template-columns:repeat(auto-fill,minmax(380px,1fr))}.metrics{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:6px;overflow:visible}.metric{min-width:0;padding:8px 6px;overflow:hidden}.metric small{white-space:nowrap}.metric b{font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}}@media(max-width:600px){body{padding:12px}.summary{grid-template-columns:repeat(5,minmax(0,1fr));gap:4px}.sum{padding:9px 3px;text-align:center}.sum b{font-size:15px}.sum span{font-size:8px}.grid{grid-template-columns:1fr}.head h1{font-size:17px}}
</style></head><body><div class="head"><div><h1><i class="fas fa-wave-square" style="color:#3478f6"></i> 实时数据</h1><div class="owner">平台全部设备实时监控</div></div><div class="live"><span class="dot"></span><span id="updated">连接中</span></div></div><div class="summary"><div class="sum"><span>设备</span><b id="total">--</b></div><div class="sum"><span>在线</span><b id="online">--</b></div><div class="sum"><span>离线</span><b id="offline">--</b></div><div class="sum"><span>控制器</span><b id="controllers">--</b></div><div class="sum"><span>传感器</span><b id="sensors">--</b></div></div><div class="grid" id="grid"></div><script>
const defs={soil_moisture:['土壤湿度','%','fa-droplet'],air_humidity:['空气湿度','%','fa-water'],temperature:['温度','℃','fa-temperature-half'],light:['光照','lux','fa-sun']};const esc=v=>String(v??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));async function load(){try{const r=await fetch('/api/admin/data/realtime',{cache:'no-store'}),d=await r.json();if(!d.success)throw Error(d.error);total.textContent=d.devices.length;online.textContent=d.devices.filter(x=>x.status==='online').length;offline.textContent=d.devices.filter(x=>x.status!=='online').length;controllers.textContent=d.devices.filter(x=>x.device_type==='controller').length;sensors.textContent=d.devices.filter(x=>x.device_type==='sensor').length;grid.innerHTML=d.devices.length?d.devices.map(x=>{const m=Object.entries(defs).filter(([k])=>x.sensor_data?.[k]!=null).map(([k,a])=>`<div class="metric"><small><i class="fas ${a[2]}"></i> ${a[0]}</small><b>${esc(x.sensor_data[k])}${a[1]}</b></div>`).join('');return `<div class="device"><div class="device-top"><div class="ico"><i class="fas fa-${x.device_type==='sensor'?'satellite-dish':'microchip'}"></i></div><div><div class="name">${esc(x.device_name||'未命名设备')}</div><div class="code">${esc(x.device_code)} · ${x.device_type==='sensor'?'传感器':'控制器'}</div><div class="owner"><i class="fas fa-user"></i> ${esc(x.username||'未分配用户')}</div></div><span class="status ${x.status==='online'?'':'off'}">${x.status==='online'?'在线':'离线'}</span></div><div class="metrics">${m||'<span class="owner">等待数据上报</span>'}</div></div>`}).join(''):'<div class="empty"><i class="fas fa-chart-line"></i><p>暂无设备数据</p></div>';updated.textContent='刚刚更新'}catch(e){updated.textContent='连接失败'}}load();setInterval(load,5000);document.addEventListener('visibilitychange',()=>{if(!document.hidden)load()});
</script></body></html>
