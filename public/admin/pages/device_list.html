<html lang="zh">
<head>
<meta charset="UTF-8">

<title>设备列表</title>
<link rel="stylesheet" href="https://cdn.bootcdn.net/ajax/libs/font-awesome/6.5.1/css/all.min.css" media="print" onload="this.media='all'">
<link href="https://fonts.loli.net/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}html,body{max-width:100%;overflow-x:hidden}body{font-family:'Inter',-apple-system,BlinkMacSystemFont,sans-serif;background:#f5f6fa;color:#1e293b;padding:18px;min-height:100vh}.page-header{display:flex;justify-content:space-between;align-items:flex-end;gap:12px;margin-bottom:14px}.title h1{font-size:20px;font-weight:800;letter-spacing:-.4px;color:#111827;display:flex;align-items:center;gap:9px}.title h1 i{color:#3b82f6}.title p{font-size:12px;color:#8a94a6;margin-top:4px}.summary{display:flex;gap:8px;overflow-x:auto;scrollbar-width:none;margin-bottom:14px}.summary::-webkit-scrollbar{display:none}.pill{background:#fff;border:1px solid #eef0f4;border-radius:999px;padding:7px 12px;display:flex;align-items:center;gap:7px;white-space:nowrap;flex-shrink:0;font-size:12px;color:#64748b}.pill b{font-size:13px;color:#1e293b}.dot{width:7px;height:7px;border-radius:50%;background:#94a3b8}.blue{background:#3b82f6}.green{background:#059669}.orange{background:#f59e0b}.red{background:#dc2626}.purple{background:#7c3aed}.toolbar{background:#fff;border:1px solid #eef0f4;border-radius:16px;padding:10px;display:flex;align-items:center;gap:10px;margin-bottom:12px}.search-wrap{position:relative;flex:1;min-width:180px}.search-wrap i{position:absolute;left:13px;top:50%;transform:translateY(-50%);color:#9aa4b2;font-size:13px}.search-input{width:100%;height:38px;padding:0 14px 0 38px;border:1px solid #e5e7eb;border-radius:11px;background:#f8fafc;color:#1e293b;font-size:13px;outline:none}.search-input:focus{background:#fff;border-color:#3b82f6;box-shadow:0 0 0 3px rgba(59,130,246,.1)}.select{height:38px;border:1px solid #e5e7eb;border-radius:11px;background:#f8fafc;color:#475569;padding:0 12px;font-size:13px;outline:none}.btn{height:38px;border:none;border-radius:11px;padding:0 14px;font-size:12px;font-weight:700;font-family:inherit;cursor:pointer;transition:.18s;display:inline-flex;align-items:center;gap:6px}.btn-primary{background:#3b82f6;color:#fff}.btn-primary:hover{background:#2563eb;transform:translateY(-1px)}.btn-light{background:#f1f5f9;color:#475569}.btn-light:hover{background:#e2e8f0}.panel{background:#fff;border:1px solid #eef0f4;border-radius:18px;overflow:hidden}.table-wrap{overflow-x:auto}table{width:100%;border-collapse:collapse;min-width:980px}th{text-align:left;padding:13px 16px;background:#fbfcfe;border-bottom:1px solid #eef0f4;color:#94a3b8;font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:.5px}td{padding:13px 16px;border-bottom:1px solid #f4f6f8;color:#475569;font-size:13px;vertical-align:middle}tr:hover td{background:#fafcff}.device-cell{display:flex;align-items:center;gap:11px}.dev-icon{width:40px;height:40px;border-radius:14px;background:#eef2ff;color:#3b82f6;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}.dev-icon.sensor{background:#ecfdf5;color:#059669}.name{font-weight:800;color:#1e293b;line-height:1.2}.code{font-size:12px;color:#94a3b8;margin-top:3px;font-family:ui-monospace,SFMono-Regular,Menlo,monospace}.owner{font-weight:700;color:#334155}.sub{font-size:12px;color:#94a3b8;margin-top:3px}.badge{display:inline-flex;align-items:center;gap:5px;padding:4px 9px;border-radius:999px;font-size:11px;font-weight:800}.badge-controller{background:#eef2ff;color:#4f46e5}.badge-sensor{background:#ecfdf5;color:#059669}.badge-online{background:#ecfdf5;color:#059669}.badge-offline{background:#f1f5f9;color:#64748b}.metrics{display:flex;gap:5px;flex-wrap:wrap;max-width:250px}.metric{display:inline-flex;align-items:center;gap:4px;background:#f8fafc;color:#64748b;border-radius:8px;padding:4px 7px;font-size:11px;font-weight:700}.metric i{color:#94a3b8}.actions{display:flex;gap:6px;justify-content:flex-end}.icon-btn{width:32px;height:32px;border:none;border-radius:9px;display:inline-flex;align-items:center;justify-content:center;cursor:pointer;transition:.16s}.icon-btn:hover{transform:translateY(-1px)}.btn-edit{background:#eef2ff;color:#4f46e5}.btn-log{background:#f8fafc;color:#475569}.btn-copy{background:#ecfdf5;color:#059669}.btn-delete{background:#fef2f2;color:#dc2626}.mobile-list{display:none;padding:10px;gap:10px}.device-card{border:1px solid #eef0f4;border-radius:16px;padding:12px;background:#fff}.card-top{display:flex;align-items:flex-start;justify-content:space-between;gap:10px;margin-bottom:10px}.card-main{display:flex;align-items:center;gap:10px;min-width:0}.card-main .name,.card-main .code{max-width:52vw;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}.card-badges{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:9px}.card-meta{display:grid;grid-template-columns:1fr 1fr;gap:7px;font-size:12px;color:#64748b}.card-meta span{background:#f8fafc;border-radius:9px;padding:7px 8px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}.card-actions{display:flex;gap:7px;margin-top:10px}.card-actions .btn{flex:1;justify-content:center;height:34px}.pagination{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:12px 14px;border-top:1px solid #eef0f4}.pagination-info{font-size:12px;color:#8892a4}.pagination-btns{display:flex;gap:6px;flex-wrap:wrap;justify-content:flex-end}.page-btn{height:32px;min-width:32px;padding:0 10px;border:1px solid #e2e8f0;border-radius:9px;background:#fff;color:#475569;font-size:12px;font-weight:700;cursor:pointer}.page-btn.active{background:#3b82f6;color:#fff;border-color:#3b82f6}.log-link{border:none;background:#f8fafc;color:#3b82f6;border-radius:9px;padding:6px 10px;font-size:12px;font-weight:800;cursor:pointer}.log-link:hover{background:#eef2ff}.log-list{display:flex;flex-direction:column;gap:10px}.log-item{background:#fff;border:1px solid #eef0f4;border-radius:12px;padding:12px}.log-head{display:flex;align-items:center;gap:10px;margin-bottom:8px}.log-ico{width:30px;height:30px;border-radius:10px;display:flex;align-items:center;justify-content:center;background:#eef2ff;color:#3b82f6;flex-shrink:0}.log-ico.ok{background:#ecfdf5;color:#059669}.log-ico.err{background:#fef2f2;color:#dc2626}.log-title{font-size:13px;font-weight:800;color:#1e293b}.log-time{margin-left:auto;font-size:11px;color:#94a3b8}.log-content{font-size:12px;color:#475569;line-height:1.6;margin-bottom:8px}.log-actions{display:flex;gap:7px;flex-wrap:wrap}.detail-content{font-size:12px;color:#475569;background:#f8fafc;border:1px solid #e2e8f0;border-radius:9px;padding:10px;line-height:1.7;font-family:ui-monospace,SFMono-Regular,Menlo,monospace;white-space:pre-wrap;word-break:break-all;max-height:260px;overflow:auto;margin-top:8px}.empty{padding:46px 20px;text-align:center;color:#94a3b8}.modal-overlay{display:none;position:fixed;inset:0;z-index:2000;background:rgba(15,23,42,.38);backdrop-filter:blur(4px);align-items:center;justify-content:center;padding:18px}.modal-overlay.show{display:flex}.modal-box{width:min(460px,100%);background:#fff;border-radius:18px;box-shadow:0 22px 60px rgba(15,23,42,.22);overflow:hidden;animation:pop .18s ease-out}@keyframes pop{from{transform:translateY(14px) scale(.98);opacity:0}to{transform:none;opacity:1}}.modal-header{padding:16px 18px;border-bottom:1px solid #eef0f4;display:flex;align-items:center;justify-content:space-between}.modal-title{font-size:15px;font-weight:800;color:#1e293b}.modal-close{width:32px;height:32px;border:none;border-radius:10px;background:#f8fafc;color:#94a3b8;cursor:pointer}.modal-body{padding:18px}.form-group{margin-bottom:14px}.form-label{display:block;font-size:12px;font-weight:800;color:#475569;margin-bottom:7px}.form-input{width:100%;height:40px;border:1.5px solid #e5e7eb;border-radius:11px;padding:0 12px;font-size:13px;font-family:inherit;color:#1e293b;background:#fff;outline:none}.form-input:focus{border-color:#3b82f6;box-shadow:0 0 0 3px rgba(59,130,246,.1)}.hint{font-size:11px;color:#94a3b8;margin-top:6px;line-height:1.5}.modal-footer{padding:14px 18px;border-top:1px solid #eef0f4;display:flex;justify-content:flex-end;gap:9px}.toast-msg{position:fixed;top:18px;left:50%;transform:translateX(-50%);padding:11px 18px;border-radius:12px;font-size:13px;font-weight:700;z-index:9999;display:none;align-items:center;gap:8px;box-shadow:0 10px 30px rgba(15,23,42,.12)}.toast-msg.show{display:flex}.toast-msg.success{background:#ecfdf5;color:#059669;border:1px solid #a7f3d0}.toast-msg.error{background:#fef2f2;color:#dc2626;border:1px solid #fecaca}.danger-text{color:#dc2626}.loading{opacity:.65;pointer-events:none}@media(max-width:768px){body{padding:12px}.page-header{align-items:flex-start;flex-direction:column}.title h1{font-size:18px}.toolbar{border-radius:15px;align-items:stretch;flex-wrap:wrap}.search-wrap{flex-basis:100%}.select{flex:1;min-width:0}.btn .btn-text{display:none}.table-wrap{display:none}.mobile-list{display:grid}.pagination{align-items:flex-start;flex-direction:column}.pagination-btns{justify-content:flex-start}.modal-body{padding:16px}input,select,textarea,button{font-size:16px!important}.btn{font-size:13px!important}}@media(min-width:769px){.mobile-list{display:none!important}}
</style>
</head>
<body>
<div class="page-header"><div class="title"><h1><i class="fas fa-microchip"></i>设备列表</h1><p>查看全平台控制器与传感器，支持搜索、筛选、改名和删除</p></div></div>
<div class="summary"><div class="pill"><span class="dot blue"></span>总设备 <b id="sumTotal">-</b></div><div class="pill"><span class="dot green"></span>在线 <b id="sumOnline">-</b></div><div class="pill"><span class="dot red"></span>离线 <b id="sumOffline">-</b></div><div class="pill"><span class="dot orange"></span>控制器 <b id="sumController">-</b></div><div class="pill"><span class="dot purple"></span>传感器 <b id="sumSensor">-</b></div></div>
<div class="toast-msg" id="toastMsg"><i class="fas fa-check-circle"></i><span id="toastText"></span></div>
<div class="toolbar"><div class="search-wrap"><i class="fas fa-search"></i><input type="text" class="search-input" id="searchInput" placeholder="搜索设备名、设备码、用户或邮箱..." oninput="debounceSearch()" onkeydown="if(event.key==='Enter'){currentPage=1;loadDevices()}"></div><select class="select" id="typeFilter" onchange="currentPage=1;loadDevices()"><option value="">全部类型</option><option value="controller">控制器</option><option value="sensor">传感器</option></select><select class="select" id="statusFilter" onchange="currentPage=1;loadDevices()"><option value="">全部状态</option><option value="online">在线</option><option value="offline">离线</option></select><button class="btn btn-light" onclick="clearFilters()"><i class="fas fa-xmark"></i><span class="btn-text">清空</span></button><button class="btn btn-primary" onclick="loadDevices()"><i class="fas fa-rotate"></i><span class="btn-text">刷新</span></button></div>
<div class="panel" id="panel"><div class="table-wrap"><table><thead><tr><th>设备</th><th>类型</th><th>状态</th><th>所属用户</th><th>传感数据</th><th>日志</th><th>最近心跳</th><th style="text-align:right">操作</th></tr></thead><tbody id="deviceTable"></tbody></table></div><div class="mobile-list" id="mobileList"></div><div class="pagination"><div class="pagination-info" id="paginationInfo">加载中...</div><div class="pagination-btns" id="paginationBtns"></div></div></div>
<div class="modal-overlay" id="editModal"><div class="modal-box"><div class="modal-header"><div class="modal-title">编辑设备</div><button class="modal-close" onclick="closeModal()"><i class="fas fa-xmark"></i></button></div><div class="modal-body"><input type="hidden" id="editDeviceId"><div class="form-group"><label class="form-label">设备名称</label><input type="text" class="form-input" id="editDeviceName" maxlength="50"><div class="hint">只修改平台展示名，不改变设备码和 MQTT Topic。</div></div><div class="form-group"><label class="form-label">设备码</label><input type="text" class="form-input" id="editDeviceCode" disabled></div></div><div class="modal-footer"><button class="btn btn-light" onclick="closeModal()">取消</button><button class="btn btn-primary" id="saveBtn" onclick="saveDevice()">保存</button></div></div></div>
<div class="modal-overlay" id="confirmModal"><div class="modal-box"><div class="modal-header"><div class="modal-title" id="confirmTitle">确认操作</div><button class="modal-close" onclick="resolveConfirm(false)"><i class="fas fa-xmark"></i></button></div><div class="modal-body"><div id="confirmMsg" style="font-size:13px;line-height:1.7;color:#475569"></div></div><div class="modal-footer"><button class="btn btn-light" onclick="resolveConfirm(false)">取消</button><button class="btn btn-primary" id="confirmOk" onclick="resolveConfirm(true)">确定</button></div></div></div>
<script>
let currentPage=1, searchTimer=null, devicesCache=[], confirmResolver=null;
function esc(s){return String(s??'').replace(/[&<>'"]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[m]));}
function fmtDate(v){if(!v)return '从未';let d=new Date(v);if(isNaN(d))return '从未';return d.toLocaleString('zh-CN',{hour12:false});}
function rel(sec){if(sec===null||sec===undefined)return '从未';sec=Number(sec);if(sec<60)return sec+'秒前';let m=Math.floor(sec/60);if(m<60)return m+'分钟前';let h=Math.floor(m/60);if(h<24)return h+'小时前';return Math.floor(h/24)+'天前'}
function showToast(msg,type){const el=document.getElementById('toastMsg');el.className='toast-msg show '+(type||'success');el.querySelector('i').className='fas fa-'+(type==='error'?'circle-exclamation':'check-circle');document.getElementById('toastText').textContent=msg;clearTimeout(el._t);el._t=setTimeout(()=>el.classList.remove('show'),2200)}
function debounceSearch(){clearTimeout(searchTimer);searchTimer=setTimeout(()=>{currentPage=1;loadDevices()},350)}
function clearFilters(){document.getElementById('searchInput').value='';document.getElementById('typeFilter').value='';document.getElementById('statusFilter').value='';currentPage=1;loadDevices()}
function typeBadge(d){let isSensor=d.device_type==='sensor';return `<span class="badge ${isSensor?'badge-sensor':'badge-controller'}"><i class="fas fa-${isSensor?'satellite-dish':'faucet-drip'}"></i>${isSensor?'传感器':'控制器'}</span>`}
function statusBadge(d){let on=d.status==='online';return `<span class="badge ${on?'badge-online':'badge-offline'}"><i class="fas fa-${on?'signal':'power-off'}"></i>${on?'在线':'离线'}</span>`}
function iconClass(d){return d.device_type==='sensor'?'dev-icon sensor':'dev-icon'}
function metrics(d){let s=d.sensor_data||{}, arr=[];if(s.soil_moisture!==undefined)arr.push(`<span class="metric"><i class="fas fa-droplet"></i>${esc(s.soil_moisture)}%</span>`);if(s.temperature!==undefined)arr.push(`<span class="metric"><i class="fas fa-temperature-half"></i>${esc(s.temperature)}℃</span>`);if(s.air_humidity!==undefined)arr.push(`<span class="metric"><i class="fas fa-water"></i>${esc(s.air_humidity)}%</span>`);if(s.light!==undefined)arr.push(`<span class="metric"><i class="fas fa-sun"></i>${esc(s.light)}lux</span>`);return arr.length?arr.join(''):'<span class="sub">暂无数据</span>'}
async function loadDevices(){const panel=document.getElementById('panel');panel.classList.add('loading');const search=document.getElementById('searchInput').value.trim(), type=document.getElementById('typeFilter').value, status=document.getElementById('statusFilter').value;try{const url=`/api/admin/devices?page=${currentPage}&limit=20&search=${encodeURIComponent(search)}&type=${encodeURIComponent(type)}&status=${encodeURIComponent(status)}`;const res=await fetch(url,{cache:'no-store'});const data=await res.json();if(!data.success)throw new Error(data.error||'加载失败');devicesCache=data.devices||[];renderDevices(devicesCache,data.total||0,data.page||1,data.limit||20,data.stats||{})}catch(e){showToast(e.message||'加载失败','error')}finally{panel.classList.remove('loading')}}
function renderDevices(devices,total,page,limit,stats){document.getElementById('sumTotal').textContent=stats.total??'-';document.getElementById('sumOnline').textContent=stats.online??'-';document.getElementById('sumOffline').textContent=stats.offline??'-';document.getElementById('sumController').textContent=stats.controllers??'-';document.getElementById('sumSensor').textContent=stats.sensors??'-';const tbody=document.getElementById('deviceTable'), mobile=document.getElementById('mobileList'), totalPages=Math.max(1,Math.ceil(total/limit));if(!devices.length){tbody.innerHTML='<tr><td colspan="8"><div class="empty">暂无设备</div></td></tr>';mobile.innerHTML='<div class="empty">暂无设备</div>'}else{tbody.innerHTML=devices.map(rowHtml).join('');mobile.innerHTML=devices.map(cardHtml).join('')}document.getElementById('paginationInfo').textContent=`共 ${total} 台设备，第 ${page}/${totalPages} 页`;let btns='';if(page>1)btns+=`<button class="page-btn" onclick="goPage(${page-1})">上一页</button>`;for(let i=Math.max(1,page-2);i<=Math.min(totalPages,page+2);i++)btns+=`<button class="page-btn ${i===page?'active':''}" onclick="goPage(${i})">${i}</button>`;if(page<totalPages)btns+=`<button class="page-btn" onclick="goPage(${page+1})">下一页</button>`;document.getElementById('paginationBtns').innerHTML=btns}
function rowHtml(d){return `<tr><td><div class="device-cell"><div class="${iconClass(d)}"><i class="fas fa-${d.device_type==='sensor'?'satellite-dish':'faucet-drip'}"></i></div><div><div class="name">${esc(d.device_name||'未命名设备')}</div><div class="code">${esc(d.device_code)}</div></div></div></td><td>${typeBadge(d)}<div class="sub">${esc(d.device_model||'-')}</div></td><td>${statusBadge(d)}<div class="sub">${rel(d.seconds_since_heartbeat)}</div></td><td><div class="owner">${esc(d.username)}</div><div class="sub">${esc(d.email)}</div></td><td><div class="metrics">${metrics(d)}</div></td><td><button class="log-link" onclick="openLogs(${d.id})"><i class="fas fa-clock-rotate-left"></i> ${d.log_count||0} 条</button></td><td><div class="meta">${esc(fmtDate(d.last_heartbeat))}</div></td><td><div class="actions"><button class="icon-btn btn-copy" onclick="copyCode('${esc(d.device_code)}')" title="复制设备码"><i class="fas fa-copy"></i></button><button class="icon-btn btn-log" onclick="openLogs(${d.id})" title="查看日志"><i class="fas fa-clock-rotate-left"></i></button><button class="icon-btn btn-edit" onclick="editDevice(${d.id})" title="编辑"><i class="fas fa-pen"></i></button><button class="icon-btn btn-delete" onclick="deleteDevice(${d.id})" title="删除"><i class="fas fa-trash"></i></button></div></td></tr>`}
function cardHtml(d){return `<div class="device-card"><div class="card-top"><div class="card-main"><div class="${iconClass(d)}"><i class="fas fa-${d.device_type==='sensor'?'satellite-dish':'faucet-drip'}"></i></div><div><div class="name">${esc(d.device_name||'未命名设备')}</div><div class="code">${esc(d.device_code)}</div></div></div>${statusBadge(d)}</div><div class="card-badges">${typeBadge(d)}</div><div class="metrics" style="margin-bottom:9px">${metrics(d)}</div><div class="card-meta"><span>用户 ${esc(d.username)}</span><span onclick="openLogs(${d.id})" style="color:#3b82f6">日志 ${d.log_count||0} 条</span><span>${rel(d.seconds_since_heartbeat)}</span><span>${esc(d.device_model||'-')}</span></div><div class="card-actions"><button class="btn btn-light" onclick="copyCode('${esc(d.device_code)}')"><i class="fas fa-copy"></i>复制</button><button class="btn btn-light" onclick="openLogs(${d.id})"><i class="fas fa-clock-rotate-left"></i>日志</button><button class="btn btn-light" onclick="editDevice(${d.id})"><i class="fas fa-pen"></i>编辑</button><button class="btn btn-light danger-text" onclick="deleteDevice(${d.id})"><i class="fas fa-trash"></i>删除</button></div></div>`}
function goPage(p){currentPage=p;loadDevices()}function findDevice(id){return devicesCache.find(d=>Number(d.id)===Number(id))}
function editDevice(id){let d=findDevice(id);if(!d)return;document.getElementById('editDeviceId').value=d.id;document.getElementById('editDeviceName').value=d.device_name||'';document.getElementById('editDeviceCode').value=d.device_code||'';document.getElementById('editModal').classList.add('show')}
function closeModal(){document.getElementById('editModal').classList.remove('show')}
async function saveDevice(){let id=document.getElementById('editDeviceId').value,name=document.getElementById('editDeviceName').value.trim(),btn=document.getElementById('saveBtn');if(!name)return showToast('设备名称不能为空','error');btn.disabled=true;btn.textContent='保存中...';try{let res=await fetch(`/api/admin/devices/${id}`,{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify({device_name:name})});let data=await res.json();if(data.success){btn.style.background='#059669';btn.textContent='✓ 保存成功';setTimeout(()=>{closeModal();loadDevices()},500)}else showToast(data.error||'保存失败','error')}catch(e){showToast('网络错误','error')}finally{setTimeout(()=>{btn.disabled=false;btn.style.background='';btn.textContent='保存'},900)}}
function ask(title,msg,okText,danger){document.getElementById('confirmTitle').textContent=title;document.getElementById('confirmMsg').innerHTML=msg;let ok=document.getElementById('confirmOk');ok.textContent=okText||'确定';ok.style.background=danger?'#dc2626':'';document.getElementById('confirmModal').classList.add('show');return new Promise(r=>confirmResolver=r)}function resolveConfirm(v){document.getElementById('confirmModal').classList.remove('show');if(confirmResolver){confirmResolver(v);confirmResolver=null}}
function openLogs(id){try{parent.openModalPost('/admin/pages/device_log','操作日志',{device_id:String(id)},'720px','86vh')}catch(e){showToast('无法打开日志弹窗','error')}}
async function deleteDevice(id){let d=findDevice(id);if(!d)return;if(!await ask('删除设备',`确定删除 <b>${esc(d.device_name||d.device_code)}</b> 吗？<br><span class="danger-text">会同时删除该设备日志和命令记录，此操作不可恢复。</span>`,'确认删除',true))return;try{let res=await fetch(`/api/admin/devices/${id}`,{method:'DELETE'});let data=await res.json();if(data.success){showToast('已删除','success');loadDevices()}else showToast(data.error||'删除失败','error')}catch(e){showToast('删除失败','error')}}
async function copyCode(code){try{await navigator.clipboard.writeText(code);showToast('设备码已复制','success')}catch(e){showToast(code,'success')}}
loadDevices();setInterval(loadDevices,30000);
</script>
</body>
</html>
