<!DOCTYPE html><html lang="zh"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>历史数据</title><script src="/vendor/echarts.min.js"></script><link rel="stylesheet" href="https://cdn.bootcdn.net/ajax/libs/font-awesome/6.5.1/css/all.min.css" media="print" onload="this.media='all'"><noscript><link rel="stylesheet" href="https://cdn.bootcdn.net/ajax/libs/font-awesome/6.5.1/css/all.min.css"></noscript><style>
*{box-sizing:border-box}body{margin:0;background:#f5f6fa;color:#1e293b;font-family:Inter,-apple-system,sans-serif;padding:18px;overflow-x:hidden}h1{font-size:19px;margin:0 0 3px}.sub{font-size:10px;color:#8a95a8}.toolbar,.panel{background:#fff;border-radius:15px;padding:13px;margin-top:12px}.toolbar{display:grid;grid-template-columns:minmax(230px,1.4fr) minmax(160px,.6fr);gap:9px}.field label{display:block;font-size:10px;color:#8490a3;margin-bottom:5px}.custom-select{position:relative}.trigger{height:40px;width:100%;border:0;border-radius:10px;background:#f1f5f9;padding:0 12px;display:flex;align-items:center;justify-content:space-between;color:#334155;cursor:pointer}.menu{position:absolute;left:0;right:0;top:46px;z-index:20;background:#fff;border-radius:11px;padding:5px;max-height:250px;overflow:auto;box-shadow:0 12px 30px rgba(30,41,59,.14);display:none}.custom-select.open .menu{display:block}.option{padding:10px;border-radius:8px;font-size:12px;cursor:pointer;display:flex;justify-content:space-between}.option:hover,.option.active{background:#eef5ff;color:#2563eb}.metrics{display:flex;gap:8px;overflow:auto;margin-top:11px;scrollbar-width:none}.metric{border:0;border-radius:12px;background:#fff;padding:10px 13px;min-width:125px;text-align:left;color:#334155;cursor:pointer}.metric.active{background:#3478f6;color:#fff}.metric small{font-size:10px;color:#8490a3}.metric.active small{color:#dbeafe}.metric b{display:block;font-size:15px;margin-top:3px}.metric em{display:block;font-style:normal;font-size:9px;color:#a0a9b7;margin-top:2px}.metric.active em{color:#bfdbfe}.chart{height:400px}.title{font-size:13px;font-weight:700}.note{font-size:10px;color:#94a3b8;margin-top:2px}@media(max-width:600px){body{padding:12px}.toolbar{grid-template-columns:1fr 1fr}.trigger{font-size:16px}.option{font-size:14px}.chart{height:345px}.metric{min-width:115px}}
</style></head><body><h1><i class="fas fa-clock-rotate-left" style="color:#3478f6"></i> 历史数据</h1><div class="sub">平台全部设备 · 条件自动保存 · 每30秒更新</div><div class="toolbar"><div class="field"><label>设备 / 所属用户</label><div class="custom-select" id="deviceSelect"><button class="trigger"><span>正在加载...</span><i class="fas fa-chevron-down"></i></button><div class="menu"></div></div></div><div class="field"><label>时间范围</label><div class="custom-select" id="hoursSelect"><button class="trigger"><span>最近24小时</span><i class="fas fa-chevron-down"></i></button><div class="menu"></div></div></div></div><div class="metrics" id="metrics"></div><div class="panel"><div class="title" id="title">历史趋势</div><div class="note" id="note">点击上方数据卡片切换图表</div><div class="chart" id="chart"></div></div><script>
const KEY='iot_admin_history_filters_v1',defs={soil_moisture:{name:'土壤湿度',unit:'%',icon:'fa-droplet',color:'#3b82f6',min:0,max:100},air_humidity:{name:'空气湿度',unit:'%',icon:'fa-water',color:'#06b6d4',min:0,max:100},temperature:{name:'温度',unit:'℃',icon:'fa-temperature-half',color:'#f59e0b',min:-20,max:60},light:{name:'光照',unit:'lux',icon:'fa-sun',color:'#8b5cf6',min:0,max:1000}},ranges=[['6','最近6小时'],['24','最近24小时'],['168','最近7天'],['720','最近30天']];let state={deviceId:'',hours:'24',metric:''};try{state={...state,...JSON.parse(localStorage.getItem(KEY)||'{}')}}catch(e){}const requestedDevice=new URLSearchParams(location.search).get('device_id');if(requestedDevice)state.deviceId=requestedDevice;let chart=echarts.init(document.getElementById('chart')),points=[],available=[],devices=[],seq=0;const esc=v=>String(v??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));function save(){localStorage.setItem(KEY,JSON.stringify(state))}function custom(id,items,value,change){const root=document.getElementById(id),btn=root.querySelector('.trigger'),txt=btn.querySelector('span'),menu=root.querySelector('.menu');function render(){const f=items.find(x=>String(x[0])===String(value));txt.textContent=f?f[1]:'请选择';menu.innerHTML=items.map(x=>`<div class="option ${String(x[0])===String(value)?'active':''}" data-v="${esc(x[0])}"><span>${esc(x[1])}</span>${String(x[0])===String(value)?'<i class="fas fa-check"></i>':''}</div>`).join('')}render();btn.onclick=e=>{e.preventDefault();e.stopPropagation();document.querySelectorAll('.custom-select.open').forEach(x=>{if(x!==root)x.classList.remove('open')});root.classList.toggle('open')};menu.onclick=e=>{const o=e.target.closest('.option');if(!o)return;value=o.dataset.v;root.classList.remove('open');render();change(value)};return{set(a,v){items=a;value=v;render()}}}document.addEventListener('click',()=>document.querySelectorAll('.custom-select.open').forEach(x=>x.classList.remove('open')));custom('hoursSelect',ranges,state.hours,v=>{state.hours=v;save();loadHistory()});let dc=custom('deviceSelect',[],'',()=>{});async function init(){const r=await fetch('/api/admin/data/realtime',{cache:'no-store'}),d=await r.json();devices=d.devices||[];if(!devices.length){empty('暂无设备');return}if(!devices.some(x=>String(x.id)===String(state.deviceId)))state.deviceId=String(devices[0].id);dc=custom('deviceSelect',devices.map(x=>[String(x.id),`${x.device_name||x.device_code} · ${x.device_code} · ${x.username||'未分配用户'}`]),state.deviceId,v=>{state.deviceId=v;state.metric='';save();loadHistory()});save();loadHistory()}async function loadHistory(){if(!state.deviceId)return;const n=++seq;try{const r=await fetch(`/api/admin/data/history?device_id=${encodeURIComponent(state.deviceId)}&hours=${encodeURIComponent(state.hours)}`,{cache:'no-store'}),d=await r.json();if(!d.success)throw Error(d.error);if(n!==seq)return;points=d.points||[];available=Object.keys(defs).filter(k=>points.some(p=>Number.isFinite(Number(p.sensor_data?.[k]))));if(!available.includes(state.metric))state.metric=available[0]||'';save();renderMetrics();renderChart()}catch(e){empty(e.message||'加载失败')}}function renderMetrics(){metrics.innerHTML=available.length?available.map(k=>{const d=defs[k],a=points.map(p=>Number(p.sensor_data[k])).filter(Number.isFinite),avg=a.reduce((x,y)=>x+y,0)/a.length;return `<button class="metric ${state.metric===k?'active':''}" data-k="${k}"><small><i class="fas ${d.icon}"></i> ${d.name}</small><b>${avg.toFixed(1)}${d.unit}</b><em>平均值</em></button>`}).join(''):'<span class="sub">当前范围暂无数据</span>';metrics.querySelectorAll('.metric').forEach(b=>b.onclick=()=>{state.metric=b.dataset.k;save();renderMetrics();renderChart()})}function empty(msg){chart.clear();chart.setOption({title:{text:msg,left:'center',top:'middle',textStyle:{fontSize:13,color:'#94a3b8'}}})}function renderChart(){if(!state.metric)return empty('当前时间范围内暂无传感器数据');const d=defs[state.metric];title.textContent=d.name+'趋势';note.textContent=d.unit==='%'?'纵轴固定 0–100%':`纵轴固定 ${d.min}–${d.max}${d.unit}`;chart.clear();chart.setOption({animation:false,color:[d.color],tooltip:{trigger:'axis',valueFormatter:v=>Number(v).toFixed(1)+d.unit},grid:{left:48,right:18,top:25,bottom:52},xAxis:{type:'time'},yAxis:{type:'value',min:d.min,max:d.max,scale:false,name:d.unit,splitLine:{lineStyle:{color:'#eef2f7'}}},dataZoom:[{type:'inside'},{type:'slider',height:17,bottom:6}],series:[{name:d.name,type:'line',smooth:true,showSymbol:false,connectNulls:true,data:points.map(p=>[new Date(p.recorded_at),p.sensor_data?.[state.metric]??null]),lineStyle:{width:2},areaStyle:{opacity:.035}}]},true)}window.addEventListener('resize',()=>chart.resize());setInterval(()=>{if(!document.hidden)loadHistory()},30000);init();
</script></body></html>
