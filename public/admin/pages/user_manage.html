<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">

<title>用户管理</title>
<link rel="stylesheet" href="https://cdn.bootcdn.net/ajax/libs/font-awesome/6.5.1/css/all.min.css" media="print" onload="this.media='all'">
<link href="https://fonts.loli.net/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}html,body{max-width:100%;overflow-x:hidden}body{font-family:'Inter',-apple-system,BlinkMacSystemFont,sans-serif;background:#f5f6fa;color:#1e293b;padding:18px;min-height:100vh}.page-header{display:flex;align-items:flex-end;justify-content:space-between;gap:12px;margin-bottom:14px}.title h1{font-size:20px;font-weight:800;letter-spacing:-.4px;color:#111827;display:flex;align-items:center;gap:9px}.title h1 i{color:#3b82f6}.title p{font-size:12px;color:#8a94a6;margin-top:4px}.summary{display:flex;gap:8px;overflow-x:auto;scrollbar-width:none;margin-bottom:14px}.summary::-webkit-scrollbar{display:none}.pill{background:#fff;border:1px solid #eef0f4;border-radius:999px;padding:7px 12px;display:flex;align-items:center;gap:7px;white-space:nowrap;flex-shrink:0;font-size:12px;color:#64748b}.pill b{font-size:13px;color:#1e293b}.pill .dot{width:7px;height:7px;border-radius:50%;background:#3b82f6}.pill.green .dot{background:#059669}.pill.orange .dot{background:#f59e0b}.pill.red .dot{background:#dc2626}.toolbar{background:#fff;border:1px solid #eef0f4;border-radius:16px;padding:10px;display:flex;align-items:center;gap:10px;margin-bottom:12px}.search-wrap{position:relative;flex:1;min-width:160px}.search-wrap i{position:absolute;left:13px;top:50%;transform:translateY(-50%);color:#9aa4b2;font-size:13px}.search-input{width:100%;height:38px;padding:0 14px 0 38px;border:1px solid #e5e7eb;border-radius:11px;background:#f8fafc;color:#1e293b;font-size:13px;outline:none}.search-input:focus{background:#fff;border-color:#3b82f6;box-shadow:0 0 0 3px rgba(59,130,246,.1)}.btn{height:38px;border:none;border-radius:11px;padding:0 14px;font-size:12px;font-weight:700;font-family:inherit;cursor:pointer;transition:.18s;display:inline-flex;align-items:center;gap:6px}.btn-primary{background:#3b82f6;color:#fff}.btn-primary:hover{background:#2563eb;transform:translateY(-1px)}.btn-light{background:#f1f5f9;color:#475569}.btn-light:hover{background:#e2e8f0}.panel{background:#fff;border:1px solid #eef0f4;border-radius:18px;overflow:hidden}.table-wrap{overflow-x:auto}table{width:100%;border-collapse:collapse;min-width:880px}th{text-align:left;padding:13px 16px;background:#fbfcfe;border-bottom:1px solid #eef0f4;color:#94a3b8;font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:.5px}td{padding:13px 16px;border-bottom:1px solid #f4f6f8;color:#475569;font-size:13px;vertical-align:middle}tr:hover td{background:#fafcff}.user-cell{display:flex;align-items:center;gap:11px}.avatar{width:38px;height:38px;border-radius:13px;background:#eef2ff;color:#3b82f6;display:flex;align-items:center;justify-content:center;font-weight:800;flex-shrink:0}.name{font-weight:800;color:#1e293b;line-height:1.2}.email{font-size:12px;color:#94a3b8;margin-top:3px}.meta{font-size:12px;color:#64748b}.badge{display:inline-flex;align-items:center;gap:5px;padding:4px 9px;border-radius:999px;font-size:11px;font-weight:800}.badge-user{background:#eef2ff;color:#4f46e5}.badge-admin{background:#fff7ed;color:#ea580c}.badge-root{background:#fef3c7;color:#b45309}.badge-active{background:#ecfdf5;color:#059669}.badge-banned{background:#fef2f2;color:#dc2626}.actions{display:flex;gap:6px;justify-content:flex-end}.icon-btn{width:32px;height:32px;border:none;border-radius:9px;display:inline-flex;align-items:center;justify-content:center;cursor:pointer;transition:.16s}.icon-btn:hover{transform:translateY(-1px)}.btn-edit{background:#eef2ff;color:#4f46e5}.btn-login{background:#ecfdf5;color:#059669}.btn-ban{background:#fff7ed;color:#ea580c}.btn-unban{background:#ecfdf5;color:#059669}.btn-delete{background:#fef2f2;color:#dc2626}.icon-btn:disabled{opacity:.35;cursor:not-allowed;transform:none}.mobile-list{display:none;padding:10px;gap:10px}.user-card{border:1px solid #eef0f4;border-radius:16px;padding:12px;background:#fff}.user-card-top{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:10px}.user-main{display:flex;align-items:center;gap:10px;min-width:0}.user-main .name,.user-main .email{max-width:48vw;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}.card-badges{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:9px}.card-meta{display:grid;grid-template-columns:1fr 1fr;gap:7px;font-size:12px;color:#64748b}.card-meta span{background:#f8fafc;border-radius:9px;padding:7px 8px}.card-actions{display:flex;gap:7px;margin-top:10px}.card-actions .btn{flex:1;justify-content:center;height:34px}.pagination{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:12px 14px;border-top:1px solid #eef0f4}.pagination-info{font-size:12px;color:#8892a4}.pagination-btns{display:flex;gap:6px;flex-wrap:wrap;justify-content:flex-end}.page-btn{height:32px;min-width:32px;padding:0 10px;border:1px solid #e2e8f0;border-radius:9px;background:#fff;color:#475569;font-size:12px;font-weight:700;cursor:pointer}.page-btn.active{background:#3b82f6;color:#fff;border-color:#3b82f6}.empty{padding:46px 20px;text-align:center;color:#94a3b8}.modal-overlay{display:none;position:fixed;inset:0;z-index:2000;background:rgba(15,23,42,.38);backdrop-filter:blur(4px);align-items:center;justify-content:center;padding:18px}.modal-overlay.show{display:flex}.modal-box{width:min(460px,100%);background:#fff;border-radius:18px;box-shadow:0 22px 60px rgba(15,23,42,.22);overflow:hidden;animation:pop .18s ease-out}@keyframes pop{from{transform:translateY(14px) scale(.98);opacity:0}to{transform:none;opacity:1}}.modal-header{padding:16px 18px;border-bottom:1px solid #eef0f4;display:flex;align-items:center;justify-content:space-between}.modal-title{font-size:15px;font-weight:800;color:#1e293b}.modal-close{width:32px;height:32px;border:none;border-radius:10px;background:#f8fafc;color:#94a3b8;cursor:pointer}.modal-body{padding:18px}.form-group{margin-bottom:14px}.form-label{display:block;font-size:12px;font-weight:800;color:#475569;margin-bottom:7px}.form-input,.form-select{width:100%;height:40px;border:1.5px solid #e5e7eb;border-radius:11px;padding:0 12px;font-size:13px;font-family:inherit;color:#1e293b;background:#fff;outline:none}.form-input:focus,.form-select:focus{border-color:#3b82f6;box-shadow:0 0 0 3px rgba(59,130,246,.1)}.vip-time-grid{display:grid;grid-template-columns:1fr 120px;gap:8px;width:100%;min-width:0}.vip-time-grid .form-input{min-width:0;width:100%;appearance:none;-webkit-appearance:none}.vip-time-grid input[type="date"]::-webkit-date-and-time-value,.vip-time-grid input[type="time"]::-webkit-date-and-time-value{text-align:left}.hint{font-size:11px;color:#94a3b8;margin-top:6px;line-height:1.5}.modal-footer{padding:14px 18px;border-top:1px solid #eef0f4;display:flex;justify-content:flex-end;gap:9px}.toast-msg{position:fixed;top:18px;left:50%;transform:translateX(-50%);padding:11px 18px;border-radius:12px;font-size:13px;font-weight:700;z-index:9999;display:none;align-items:center;gap:8px;box-shadow:0 10px 30px rgba(15,23,42,.12)}.toast-msg.show{display:flex}.toast-msg.success{background:#ecfdf5;color:#059669;border:1px solid #a7f3d0}.toast-msg.error{background:#fef2f2;color:#dc2626;border:1px solid #fecaca}.danger-text{color:#dc2626}.loading{opacity:.65;pointer-events:none}@media(max-width:768px){body{padding:12px}.page-header{align-items:flex-start;flex-direction:column}.title h1{font-size:18px}.toolbar{border-radius:15px;align-items:stretch}.btn .btn-text{display:none}.table-wrap{display:none}.mobile-list{display:grid}.pagination{align-items:flex-start;flex-direction:column}.pagination-btns{justify-content:flex-start}.modal-body{padding:16px}.vip-time-grid{grid-template-columns:1fr 105px;gap:7px}.vip-time-grid .form-input{padding:0 10px}input,select,textarea,button{font-size:16px!important}.btn{font-size:13px!important}}@media(max-width:380px){.vip-time-grid{grid-template-columns:1fr}.vip-time-grid .form-input{height:40px}}@media(min-width:769px){.mobile-list{display:none!important}}
</style>
</head>
<body>
<div class="page-header"><div class="title"><h1><i class="fas fa-users-gear"></i>用户管理</h1><p>管理注册用户、权限、状态与会话，已保护创始管理员安全</p></div></div>
<div class="summary"><div class="pill"><span class="dot"></span>总用户 <b id="sumTotal">-</b></div><div class="pill green"><span class="dot"></span>正常 <b id="sumActive">-</b></div><div class="pill orange"><span class="dot"></span>管理员 <b id="sumAdmin">-</b></div><div class="pill red"><span class="dot"></span>封禁 <b id="sumBanned">-</b></div></div>
<div class="toast-msg" id="toastMsg"><i class="fas fa-check-circle"></i><span id="toastText"></span></div>
<div class="toolbar"><div class="search-wrap"><i class="fas fa-search"></i><input type="text" class="search-input" id="searchInput" placeholder="搜索用户名或邮箱，回车立即搜索..." oninput="debounceSearch()" onkeydown="if(event.key==='Enter'){currentPage=1;loadUsers()}"></div><button class="btn btn-light" onclick="clearSearch()"><i class="fas fa-xmark"></i><span class="btn-text">清空</span></button><button class="btn btn-primary" onclick="loadUsers()"><i class="fas fa-rotate"></i><span class="btn-text">刷新</span></button></div>
<div class="panel" id="panel"><div class="table-wrap"><table><thead><tr><th>用户</th><th>权限</th><th>状态</th><th>设备/会话</th><th>VIP到期</th><th>注册时间</th><th>最后登录</th><th style="text-align:right">操作</th></tr></thead><tbody id="userTable"></tbody></table></div><div class="mobile-list" id="mobileList"></div><div class="pagination"><div class="pagination-info" id="paginationInfo">加载中...</div><div class="pagination-btns" id="paginationBtns"></div></div></div>
<div class="modal-overlay" id="editModal"><div class="modal-box"><div class="modal-header"><div class="modal-title">编辑用户</div><button class="modal-close" onclick="closeModal()"><i class="fas fa-xmark"></i></button></div><div class="modal-body"><input type="hidden" id="editUserId"><div class="form-group"><label class="form-label">用户名</label><input type="text" class="form-input" id="editUsername" disabled></div><div class="form-group"><label class="form-label">角色</label><select class="form-select" id="editRole"><option value="user">普通用户</option><option value="admin">管理员</option></select><div class="hint" id="roleHint">只有创始管理员可以授予或调整管理员权限。</div></div><div class="form-group"><label class="form-label">状态</label><select class="form-select" id="editStatus"><option value="active">正常</option><option value="banned">封禁</option></select><div class="hint">封禁用户会立即清除该用户所有登录态。</div></div><div class="form-group"><label class="form-label">VIP到期时间</label><div class="vip-time-grid"><input type="date" class="form-input" id="editVipDate"><input type="time" class="form-input" id="editVipTime" value="23:59"></div><div class="hint">苹果手机上分开选择日期和时间，避免系统时间选择器超出屏幕。留空表示不设置 VIP。</div></div></div><div class="modal-footer"><button class="btn btn-light" onclick="closeModal()">取消</button><button class="btn btn-primary" id="saveBtn" onclick="saveUser()">保存</button></div></div></div>
<div class="modal-overlay" id="confirmModal"><div class="modal-box"><div class="modal-header"><div class="modal-title" id="confirmTitle">确认操作</div><button class="modal-close" onclick="resolveConfirm(false)"><i class="fas fa-xmark"></i></button></div><div class="modal-body"><div id="confirmMsg" style="font-size:13px;line-height:1.7;color:#475569"></div></div><div class="modal-footer"><button class="btn btn-light" onclick="resolveConfirm(false)">取消</button><button class="btn btn-primary" id="confirmOk" onclick="resolveConfirm(true)">确定</button></div></div></div>
<script>
let currentPage=1, searchTimer=null, currentUser={id:0,is_root_admin:false}, usersCache=[], confirmResolver=null;
function esc(s){return String(s??'').replace(/[&<>'"]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[m]));}
function fmtDate(v,withTime){if(!v)return '-';let d=new Date(v);if(isNaN(d))return '-';return withTime?d.toLocaleString('zh-CN',{hour12:false}):d.toLocaleDateString('zh-CN');}
function showToast(msg,type){const el=document.getElementById('toastMsg');el.className='toast-msg show '+(type||'success');el.querySelector('i').className='fas fa-'+(type==='error'?'circle-exclamation':'check-circle');document.getElementById('toastText').textContent=msg;clearTimeout(el._t);el._t=setTimeout(()=>el.classList.remove('show'),2200)}
function debounceSearch(){clearTimeout(searchTimer);searchTimer=setTimeout(()=>{currentPage=1;loadUsers()},350)}
function clearSearch(){document.getElementById('searchInput').value='';currentPage=1;loadUsers()}
function roleBadge(u){if(Number(u.id)===1)return '<span class="badge badge-root"><i class="fas fa-crown"></i>创始管理员</span>';return `<span class="badge ${u.role==='admin'?'badge-admin':'badge-user'}"><i class="fas fa-${u.role==='admin'?'shield-halved':'user'}"></i>${u.role==='admin'?'管理员':'用户'}</span>`}
function statusBadge(u){let banned=u.status==='banned';return `<span class="badge ${banned?'badge-banned':'badge-active'}"><i class="fas fa-${banned?'ban':'check'}"></i>${banned?'封禁':'正常'}</span>`}
function canEdit(u){if(Number(u.id)===1 && !currentUser.is_root_admin)return false;if(u.role==='admin'&&!currentUser.is_root_admin&&Number(u.id)!==Number(currentUser.id))return false;return true}
function canDelete(u){if(Number(u.id)===Number(currentUser.id))return false;if(Number(u.id)===1)return false;if(u.role==='admin'&&!currentUser.is_root_admin)return false;return true}
function canLoginAs(u){if(Number(u.id)===Number(currentUser.id))return false;if(u.status==='banned')return false;if(currentUser.is_root_admin)return true;return u.role==='user'&&Number(u.id)!==1}
async function loadUsers(){const panel=document.getElementById('panel');panel.classList.add('loading');const search=document.getElementById('searchInput').value.trim();try{const res=await fetch(`/api/users?page=${currentPage}&limit=20&search=${encodeURIComponent(search)}`,{cache:'no-store'});const data=await res.json();if(!res.ok||data.error)throw new Error(data.error||'加载失败');currentUser=data.currentUser||currentUser;usersCache=data.users||[];renderUsers(usersCache,data.total||0,data.page||1,data.limit||20)}catch(e){showToast(e.message||'加载失败','error')}finally{panel.classList.remove('loading')}}
function renderUsers(users,total,page,limit){const tbody=document.getElementById('userTable'), mobile=document.getElementById('mobileList'), totalPages=Math.max(1,Math.ceil(total/limit));let active=users.filter(u=>u.status==='active').length, admin=users.filter(u=>u.role==='admin').length, banned=users.filter(u=>u.status==='banned').length;document.getElementById('sumTotal').textContent=total;document.getElementById('sumActive').textContent=active;document.getElementById('sumAdmin').textContent=admin;document.getElementById('sumBanned').textContent=banned;if(!users.length){tbody.innerHTML='<tr><td colspan="8"><div class="empty">暂无用户</div></td></tr>';mobile.innerHTML='<div class="empty">暂无用户</div>'}else{tbody.innerHTML=users.map(rowHtml).join('');mobile.innerHTML=users.map(cardHtml).join('')}document.getElementById('paginationInfo').textContent=`共 ${total} 个用户，第 ${page}/${totalPages} 页`;let btns='';if(page>1)btns+=`<button class="page-btn" onclick="goPage(${page-1})">上一页</button>`;for(let i=Math.max(1,page-2);i<=Math.min(totalPages,page+2);i++)btns+=`<button class="page-btn ${i===page?'active':''}" onclick="goPage(${i})">${i}</button>`;if(page<totalPages)btns+=`<button class="page-btn" onclick="goPage(${page+1})">下一页</button>`;document.getElementById('paginationBtns').innerHTML=btns}
function rowHtml(u){let editDis=canEdit(u)?'':'disabled', delDis=canDelete(u)?'':'disabled', loginDis=canLoginAs(u)?'':'disabled';return `<tr><td><div class="user-cell"><div class="avatar">${esc((u.username||'?')[0]).toUpperCase()}</div><div><div class="name">${esc(u.username)}</div><div class="email">${esc(u.email)}</div></div></div></td><td>${roleBadge(u)}</td><td>${statusBadge(u)}</td><td><div class="meta">设备 ${u.device_count||0} 台</div><div class="meta">会话 ${u.active_sessions||0} 个</div></td><td>${esc(fmtDate(u.vip_expire,false))}</td><td>${esc(fmtDate(u.created_at,false))}</td><td>${esc(u.last_login?fmtDate(u.last_login,true):'从未登录')}</td><td><div class="actions"><button class="icon-btn btn-login" ${loginDis} onclick="loginAsUser(${u.id})" title="登录用户中心"><i class="fas fa-right-to-bracket"></i></button><button class="icon-btn btn-edit" ${editDis} onclick="editUser(${u.id})" title="编辑"><i class="fas fa-pen"></i></button><button class="icon-btn ${u.status==='banned'?'btn-unban':'btn-ban'}" ${editDis} onclick="toggleBan(${u.id})" title="${u.status==='banned'?'解封':'封禁'}"><i class="fas fa-${u.status==='banned'?'check':'ban'}"></i></button><button class="icon-btn btn-delete" ${delDis} onclick="deleteUser(${u.id})" title="删除"><i class="fas fa-trash"></i></button></div></td></tr>`}
function cardHtml(u){let editDis=canEdit(u)?'':'disabled', delDis=canDelete(u)?'':'disabled', loginDis=canLoginAs(u)?'':'disabled';return `<div class="user-card"><div class="user-card-top"><div class="user-main"><div class="avatar">${esc((u.username||'?')[0]).toUpperCase()}</div><div><div class="name">${esc(u.username)}</div><div class="email">${esc(u.email)}</div></div></div></div><div class="card-badges">${roleBadge(u)}${statusBadge(u)}</div><div class="card-meta"><span>设备 ${u.device_count||0} 台</span><span>会话 ${u.active_sessions||0} 个</span><span>注册 ${esc(fmtDate(u.created_at,false))}</span><span>登录 ${esc(u.last_login?fmtDate(u.last_login,false):'从未')}</span></div><div class="card-actions"><button class="btn btn-light" ${loginDis} onclick="loginAsUser(${u.id})"><i class="fas fa-right-to-bracket"></i>登录</button><button class="btn btn-light" ${editDis} onclick="editUser(${u.id})"><i class="fas fa-pen"></i>编辑</button><button class="btn btn-light" ${editDis} onclick="toggleBan(${u.id})"><i class="fas fa-${u.status==='banned'?'check':'ban'}"></i>${u.status==='banned'?'解封':'封禁'}</button><button class="btn btn-light danger-text" ${delDis} onclick="deleteUser(${u.id})"><i class="fas fa-trash"></i>删除</button></div></div>`}
function goPage(p){currentPage=p;loadUsers()}function findUser(id){return usersCache.find(u=>Number(u.id)===Number(id))}
function editUser(id){let u=findUser(id);if(!u)return;document.getElementById('editUserId').value=u.id;document.getElementById('editUsername').value=u.username;document.getElementById('editRole').value=u.role;document.getElementById('editStatus').value=u.status;let vip=u.vip_expire?String(u.vip_expire):'';document.getElementById('editVipDate').value=vip?vip.slice(0,10):'';document.getElementById('editVipTime').value=vip&&vip.length>=16?vip.slice(11,16):'23:59';let role=document.getElementById('editRole'), status=document.getElementById('editStatus');role.disabled=!currentUser.is_root_admin;status.disabled=(Number(u.id)===1)||(Number(u.id)===Number(currentUser.id));document.getElementById('roleHint').textContent=currentUser.is_root_admin?'创始管理员可授予/撤销管理员权限。':'只有创始管理员可以授予或调整管理员权限。';document.getElementById('editModal').classList.add('show')}
function closeModal(){document.getElementById('editModal').classList.remove('show')}
async function saveUser(){let btn=document.getElementById('saveBtn'),id=document.getElementById('editUserId').value;let vipDate=document.getElementById('editVipDate').value, vipTime=document.getElementById('editVipTime').value||'23:59';let body={vip_expire:vipDate?(vipDate+'T'+vipTime):null};let roleEl=document.getElementById('editRole'),statusEl=document.getElementById('editStatus');if(!roleEl.disabled)body.role=roleEl.value;if(!statusEl.disabled)body.status=statusEl.value;btn.disabled=true;btn.textContent='保存中...';try{let res=await fetch(`/api/users/${id}`,{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});let data=await res.json();if(data.success){btn.style.background='#059669';btn.textContent='✓ 保存成功';setTimeout(()=>{closeModal();loadUsers()},500)}else{showToast(data.error||'保存失败','error')}}catch(e){showToast('网络错误','error')}finally{setTimeout(()=>{btn.disabled=false;btn.style.background='';btn.textContent='保存'},900)}}
function ask(title,msg,okText,danger){document.getElementById('confirmTitle').textContent=title;document.getElementById('confirmMsg').innerHTML=msg;let ok=document.getElementById('confirmOk');ok.textContent=okText||'确定';ok.style.background=danger?'#dc2626':'';document.getElementById('confirmModal').classList.add('show');return new Promise(r=>confirmResolver=r)}function resolveConfirm(v){document.getElementById('confirmModal').classList.remove('show');if(confirmResolver){confirmResolver(v);confirmResolver=null}}
async function loginAsUser(id){let u=findUser(id);if(!u)return;let ok=await ask('生成一次性登录链接',`确认为 <b>${esc(u.username)}</b> 生成授权登录链接吗？<br><span style="color:#64748b">链接只能使用一次，5分钟内有效。请复制到新的浏览器、无痕窗口或其它设备打开，这样不会覆盖当前管理员后台的登录状态。</span><br><span class="danger-text">请确认用户已授权管理员协助操作，不要把链接发给无关人员。</span>`,'生成链接',false);if(!ok)return;try{let res=await fetch(`/api/admin/impersonate/${id}`,{method:'POST'});let data=await res.json();if(data.success&&(data.full_url||data.url)){let link=data.full_url||(location.origin+data.url);let copied=false;try{await navigator.clipboard.writeText(link);copied=true}catch(e){}showToast(copied?'登录链接已复制':'登录链接已生成','success');await ask('一次性登录链接',`${copied?'已复制到剪贴板。':'请手动复制下面链接。'}<br><br><input class="form-input" readonly value="${esc(link)}" onclick="this.select()"><div class="hint">请在新浏览器或无痕窗口打开；链接一次性使用，约 ${Math.floor((data.expires_in||300)/60)} 分钟内有效。</div>`,'知道了',false)}else showToast(data.error||'创建登录链接失败','error')}catch(e){showToast('创建登录链接失败','error')}}
async function toggleBan(id){let u=findUser(id);if(!u)return;let newStatus=u.status==='banned'?'active':'banned', action=newStatus==='banned'?'封禁':'解封';if(!await ask(action+'用户',`确定要${action} <b>${esc(u.username)}</b> 吗？${newStatus==='banned'?'<br><span class="danger-text">封禁会清除该用户所有登录态。</span>':''}`,action,newStatus==='banned'))return;try{let res=await fetch(`/api/users/${id}`,{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify({status:newStatus})});let data=await res.json();if(data.success){showToast(`已${action}`,'success');loadUsers()}else showToast(data.error||'操作失败','error')}catch(e){showToast('操作失败','error')}}
async function deleteUser(id){let u=findUser(id);if(!u)return;if(!await ask('删除用户',`确定删除 <b>${esc(u.username)}</b> 吗？<br><span class="danger-text">会同时清理该用户的设备、日志、登录态和个人配置，此操作不可恢复。</span>`,'确认删除',true))return;try{let res=await fetch(`/api/users/${id}`,{method:'DELETE'});let data=await res.json();if(data.success){showToast('已删除','success');loadUsers()}else showToast(data.error||'删除失败','error')}catch(e){showToast('删除失败','error')}}
loadUsers();
</script>
</body>
</html>
